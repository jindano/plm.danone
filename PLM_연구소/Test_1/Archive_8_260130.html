

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEV ARCHIVE</title>
    <style>
/* ========== 기존 스타일 유지 ========== */
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    padding: 20px;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    background-color: white;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.title {
    font-size: 20px;
    font-weight: normal;
    margin-bottom: 20px;
    color: #333;
}

.tabs {
    display: flex;
    gap: 0;
    margin-bottom: 0;
    border-bottom: 2px solid #ddd;
}

.tab {
    padding: 12px 40px;
    border: none;
    background-color: #e8e8e8;
    cursor: pointer;
    font-size: 16px;
    font-weight: normal;
    color: #333;
    position: relative;
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
    border: 1px solid #ddd;
    border-bottom: none;
    transition: all 0.3s ease;
    clip-path: polygon(8% 0%, 92% 0%, 100% 100%, 0% 100%);
    margin-right: 5px;
}

.tab:hover {
    background-color: #d5d5d5;
}

.tab.active {
    background-color: #8BC34A;
    color: white;
    font-weight: bold;
    border-color: #8BC34A;
}

.content-area {
    display: none;
    border: 2px solid #333;
    border-top: none;
    min-height: 600px;
}

.content-area.active {
    display: flex;
}

#archive-content {
    display: none;
}

#archive-content.active {
    display: flex;
}

#archive-content .left-panel {
    width: 220px;
}

#archive-content .middle-panel {
    width: 280px;
    border-right: 2px solid #333;
    padding: 20px;
    background-color: #fafafa;
}

#archive-content .right-panel {
    flex: 1;
}

#ongoing-content,
#history-content {
    padding: 30px;
    background-color: white;
}

.ongoing-container,
.history-container {
    max-width: 1200px;
}

.empty-message {
    text-align: center;
    color: #999;
    padding: 40px;
    font-size: 14px;
}

.tab-content {
    display: none;
}

.tab-content.active {
    display: flex;
}

.panel-title {
    font-size: 16px;
    font-weight: bold;
    color: #333;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 2px solid #8BC34A;
}

.panel-header-with-button {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 0;
}

.panel-header-with-button .panel-title {
    margin-bottom: 15px;
    flex: 1;
}

.btn-add-folder {
    width: 32px;
    height: 32px;
    border: 2px solid #8BC34A;
    background-color: white;
    color: #8BC34A;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    font-size: 20px;
    font-weight: bold;
    padding: 0;
    margin-bottom: 15px;
}

.btn-add-folder:hover {
    background-color: #8BC34A;
    color: white;
    transform: scale(1.1);
}

.btn-add-folder:active {
    transform: scale(0.95);
}

.icon-plus {
    display: block;
    line-height: 1;
}

.left-panel {
    width: 280px;
    border-right: 2px solid #333;
    padding: 20px;
    background-color: #fafafa;
    display: flex;
    flex-direction: column;
}

.year-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.year-item {
    padding: 15px;
    background-color: white;
    border: 1px solid #ddd;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.year-item:hover {
    border-color: #8BC34A;
    box-shadow: 0 2px 8px rgba(139, 195, 74, 0.2);
    transform: translateX(3px);
}

.year-item.active {
    border: 2px solid #8BC34A;
    background-color: #f1f8e9;
}

.year-number {
    font-size: 20px;
    font-weight: bold;
    color: #333;
}

.year-info {
    font-size: 13px;
    color: #666;
}

.toggle-icon {
    display: inline-block;
    width: 16px;
    font-size: 12px;
    transition: transform 0.3s ease;
}

.footer-note {
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px solid #ddd;
    font-size: 14px;
    color: #666;
    text-align: left;
}

.right-panel {
    flex: 1;
    padding: 20px 30px;
    background-color: white;
    overflow-y: auto;
}

.project-tree {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.project-item-main {
    border: 1px solid #ddd;
    border-radius: 6px;
    overflow: hidden;
}

.project-main-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 15px;
    background-color: #f5f5f5;
    cursor: pointer;
    user-select: none;
    transition: background-color 0.3s ease;
    position: relative;
}

.project-main-header:hover {
    background-color: #e8f5e9;
}

.project-main-header.active {
    background-color: #8BC34A;
    color: white;
}

.project-main-name {
    font-size: 15px;
    font-weight: bold;
    flex: 1;
}

.btn-edit-brand {
    width: 24px;
    height: 24px;
    border: 1.5px solid #FF9800;
    background-color: white;
    color: #FF9800;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-size: 12px;
    padding: 0;
    flex-shrink: 0;
    line-height: 1;
    opacity: 0;
}

.project-main-header:hover .btn-edit-brand {
    opacity: 1;
}

.btn-edit-brand:hover {
    background-color: #FF9800;
    color: white;
    transform: scale(1.1);
}

.btn-edit-brand:active {
    transform: scale(0.9);
}

.project-main-header.active .btn-edit-brand {
    border-color: white;
    color: white;
    background-color: transparent;
    opacity: 1;
}

.project-main-header.active .btn-edit-brand:hover {
    background-color: white;
    color: #FF9800;
}

.btn-add-subfolder {
    width: 24px;
    height: 24px;
    border: 1.5px solid #8BC34A;
    background-color: white;
    color: #8BC34A;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-size: 16px;
    font-weight: bold;
    padding: 0;
    flex-shrink: 0;
    line-height: 1;
}

.btn-add-subfolder:hover {
    background-color: #8BC34A;
    color: white;
    transform: scale(1.1);
}

.btn-add-subfolder:active {
    transform: scale(0.9);
}

.project-main-header.active .btn-add-subfolder {
    border-color: white;
    color: white;
    background-color: transparent;
}

.project-main-header.active .btn-add-subfolder:hover {
    background-color: white;
    color: #8BC34A;
}

.project-main-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    background-color: white;
}

.project-main-content.expanded {
    max-height: 300px;
}

.sub-project-item {
    padding: 10px 15px 10px 35px;
    border-top: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background-color 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}

.sub-project-item:hover {
    background-color: #f9f9f9;
}

.sub-project-item.active {
    background-color: #e8f5e9;
    border-left: 3px solid #8BC34A;
}

.sub-project-name {
    flex: 1;
    font-size: 14px;
    color: #555;
}

.btn-edit-subfolder {
    width: 22px;
    height: 22px;
    border: 1.5px solid #FF9800;
    background-color: white;
    color: #FF9800;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-size: 11px;
    padding: 0;
    flex-shrink: 0;
    line-height: 1;
    opacity: 0;
}

.sub-project-item:hover .btn-edit-subfolder {
    opacity: 1;
}

.btn-edit-subfolder:hover {
    background-color: #FF9800;
    color: white;
    transform: scale(1.1);
}

.btn-edit-subfolder:active {
    transform: scale(0.95);
}

.sub-project-item.active .btn-edit-subfolder {
    border-color: white;
    color: white;
    opacity: 1;
}

.sub-project-item.active .btn-edit-subfolder:hover {
    background-color: white;
    color: #FF9800;
}

.btn-add-product-sub {
    width: 22px;
    height: 22px;
    border: 1.5px solid #8BC34A;
    background-color: white;
    color: #8BC34A;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-size: 14px;
    font-weight: bold;
    padding: 0;
    flex-shrink: 0;
    line-height: 1;
    opacity: 0;
}

.sub-project-item:hover .btn-add-product-sub {
    opacity: 1;
}

.btn-add-product-sub:hover {
    background-color: #8BC34A;
    color: white;
    transform: scale(1.15);
}

.btn-add-product-sub:active {
    transform: scale(0.95);
}

.sub-project-item.active .btn-add-product-sub {
    opacity: 1;
}

.product-detail {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.product-list-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px 18px;
    background-color: #f9f9f9;
    border: 2px solid #e0e0e0;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
    position: relative;
}

.product-list-item:hover {
    background-color: #e8f5e9;
    border-color: #8BC34A;
    transform: translateX(5px);
}

.product-list-item.active {
    background-color: #e8f5e9;
    border-color: #8BC34A;
    border-width: 2px;
    box-shadow: 0 2px 8px rgba(139, 195, 74, 0.3);
}

.product-icon {
    font-size: 24px;
    flex-shrink: 0;
}

.product-name-text {
    font-size: 15px;
    font-weight: 600;
    color: #333;
    flex: 1;
}

.product-list-item.active .product-name-text {
    color: #558B2F;
}

/* ★ 파일 개수 배지 스타일 추가 */
.file-count-badge {
    background: linear-gradient(135deg, #4CAF50 0%, #388E3C 100%);
    color: white;
    font-size: 11px;
    font-weight: bold;
    padding: 3px 8px;
    border-radius: 12px;
    margin-left: 8px;
    display: inline-flex;
    align-items: center;
    gap: 4px;
}

.file-count-badge .badge-icon {
    font-size: 10px;
}

.btn-delete-product {
    width: 28px;
    height: 28px;
    border: 1.5px solid #f44336;
    background-color: white;
    color: #f44336;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-size: 20px;
    font-weight: bold;
    padding: 0;
    flex-shrink: 0;
    line-height: 1;
    opacity: 0;
}

.product-list-item:hover .btn-delete-product {
    opacity: 1;
}

.btn-delete-product:hover {
    background-color: #f44336;
    color: white;
    transform: scale(1.1);
}

.btn-delete-product:active {
    transform: scale(0.9);
}

.product-tree {
    display: flex;
    flex-direction: column;
    gap: 20px;
}

.product-item {
    border: 1px solid #ddd;
    border-radius: 6px;
    overflow: hidden;
}

.product-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 15px;
    background-color: #f5f5f5;
    cursor: pointer;
    user-select: none;
    border-bottom: 1px solid #ddd;
    transition: background-color 0.3s ease;
}

.product-header:hover {
    background-color: #e8f5e9;
}

.product-name {
    font-size: 16px;
    font-weight: bold;
    color: #333;
}

.folder-icon {
    font-size: 18px;
}

.product-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.5s ease;
    background-color: white;
}

.product-content.expanded {
    max-height: 2000px;
}

.stage-item {
    border-bottom: 1px solid #f0f0f0;
}

.stage-item:last-child {
    border-bottom: none;
}

.stage-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 10px 20px;
    cursor: pointer;
    user-select: none;
    background-color: #fafafa;
    transition: background-color 0.2s ease;
}

.stage-header:hover {
    background-color: #f0f0f0;
}

.stage-name {
    font-size: 14px;
    font-weight: 600;
    color: #555;
}

.stage-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    padding: 0 20px 0 45px;
}

.stage-content.expanded {
    max-height: 300px;
    padding: 10px 20px 10px 45px;
}

.doc-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    margin: 4px 0;
    background-color: #f9f9f9;
    border: 1px solid #e0e0e0;
    border-radius: 4px;
    cursor: pointer;
    transition: all 0.2s ease;
    font-size: 13px;
}

.doc-item:hover {
    background-color: #f0f0f0;
    border-color: #8BC34A;
    transform: translateX(3px);
}

.doc-item.confirmed {
    background-color: #fff;
    border: 1px solid #8BC34A;
    border-left: 3px solid #8BC34A;
}

.doc-icon {
    font-size: 14px;
}

/* ========== ONGOING CSS ========== */
.ongoing-container {
    width: 100%;
    padding: 10px;
}

.filter-section {
    margin-bottom: 20px;
}

.filter-row {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
}

.filter-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 150px;
}

.filter-group label {
    font-size: 13px;
    font-weight: 600;
    color: #333;
}

.filter-select,
.filter-input {
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
    outline: none;
}

.filter-select:focus,
.filter-input:focus {
    border-color: #8BC34A;
}

.filter-date {
    width: 150px;
}

.report-table {
    margin-bottom: 20px;
    overflow-x: auto;
}

.report-table table {
    width: 100%;
    border-collapse: collapse;
}

.report-table th,
.report-table td {
    padding: 10px;
    border: 1px solid #ddd;
    text-align: left;
}

.report-table th {
    background-color: #f5f5f5;
    font-weight: 600;
    font-size: 13px;
}

.report-table .table-input {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
}

.report-table .table-input:focus {
    border-color: #8BC34A;
}

.doc-upload-cell {
    display: flex;
    align-items: center;
    gap: 8px;
}

.btn-upload-doc-table {
    padding: 5px 12px;
    border: 1px solid #8BC34A;
    background-color: white;
    color: #8BC34A;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    transition: all 0.2s ease;
    white-space: nowrap;
}

.btn-upload-doc-table:hover {
    background-color: #8BC34A;
    color: white;
}

.btn-upload-doc-table.uploaded {
    background-color: #e8f5e9;
    border-color: #4CAF50;
    color: #4CAF50;
}

.doc-file-name {
    font-size: 12px;
    color: #666;
    max-width: 150px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.btn-delete-doc-table {
    width: 20px;
    height: 20px;
    border: 1px solid #f44336;
    background-color: white;
    color: #f44336;
    border-radius: 3px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.btn-delete-doc-table:hover {
    background-color: #f44336;
    color: white;
}

.bottom-section {
    display: flex;
    gap: 30px;
    margin-bottom: 20px;
}

.decision-section,
.holding-section {
    flex: 1;
    padding: 15px;
    background-color: #fafafa;
    border: 1px solid #ddd;
    border-radius: 6px;
}

.decision-section label,
.holding-section label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #333;
    margin-bottom: 10px;
}

.decision-row,
.holding-row {
    display: flex;
    align-items: center;
    gap: 10px;
}

.decision-row span,
.holding-row span {
    font-size: 13px;
    color: #666;
}

.decision-input {
    padding: 6px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
}

.decision-input:focus {
    border-color: #8BC34A;
}

.holding-select {
    padding: 6px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
    min-width: 120px;
}

.holding-select:focus {
    border-color: #8BC34A;
}

.holding-input {
    flex: 1;
    padding: 6px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
}

.holding-input:focus {
    border-color: #8BC34A;
}

.save-section {
    display: flex;
    justify-content: flex-end;
}

.btn-save {
    padding: 10px 40px;
    background-color: #8BC34A;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
}

.btn-save:hover {
    background-color: #7CB342;
    transform: translateY(-2px);
    box-shadow: 0 4px 12px rgba(139, 195, 74, 0.4);
}

.btn-save:active {
    transform: translateY(0);
}

/* ========== MODAL CSS ========== */
.modal-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
    animation: fadeIn 0.2s ease;
}

@keyframes fadeIn {
    from { opacity: 0; }
    to { opacity: 1; }
}

.modal-content {
    background-color: white;
    border-radius: 12px;
    width: 90%;
    max-width: 800px;
    max-height: 85vh;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
    animation: slideIn 0.3s ease;
}

@keyframes slideIn {
    from {
        transform: translateY(-30px);
        opacity: 0;
    }
    to {
        transform: translateY(0);
        opacity: 1;
    }
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 25px;
    background-color: #8BC34A;
    color: white;
}

.modal-header h3 {
    font-size: 18px;
    font-weight: 600;
}

.signature-label {
    font-size: 12px;
    padding: 4px 10px;
    background-color: rgba(255, 255, 255, 0.2);
    border-radius: 15px;
    margin-left: auto;
    margin-right: 15px;
}

.btn-close-modal {
    width: 32px;
    height: 32px;
    border: none;
    background-color: rgba(255, 255, 255, 0.2);
    color: white;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
}

.btn-close-modal:hover {
    background-color: rgba(255, 255, 255, 0.3);
    transform: scale(1.1);
}

.modal-body {
    padding: 20px 25px;
    max-height: calc(85vh - 80px);
    overflow-y: auto;
}

/* ★ 모달 내 섹션 구분 스타일 */
.modal-section {
    margin-bottom: 25px;
    padding-bottom: 20px;
    border-bottom: 1px solid #e0e0e0;
}

.modal-section:last-child {
    margin-bottom: 0;
    padding-bottom: 0;
    border-bottom: none;
}

.modal-section-title {
    font-size: 14px;
    font-weight: 700;
    color: #333;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.modal-section-title .section-icon {
    font-size: 16px;
}

.stage-group {
    margin-bottom: 15px;
}

.stage-group:last-child {
    margin-bottom: 0;
}

.modal-doc-item {

    '2025': { projects: [{ name: '풀무원 요거트', subProjects: ['하루', '솔루션', '요거톡'], products: {} }] }
};

// ★★★ 출시된 제품의 파일 정보를 저장하는 객체 ★★★
const releasedProductFiles = {};

let currentSelectedBrand = null;
let currentSelectedYear = null;
let currentSelectedSubProject = null;
const uploadedFiles = {};
const historyRecords = [];

// ★★★ 파일 저장소 (실제 File 객체 저장) ★★★
const fileStorage = {};

document.addEventListener('DOMContentLoaded', function() {
    initTabs();

function initTabs() {
    const tabs = document.querySelectorAll('.tab');
    const tabContents = document.querySelectorAll('.tab-content');
    const pageTitle = document.getElementById('page-title');

    tabs.forEach(tab => {
        tab.addEventListener('click', function() {
            tabs.forEach(t => t.classList.remove('active'));
            tabContents.forEach(tc => tc.classList.remove('active'));
            this.classList.add('active');
            const tabName = this.getAttribute('data-tab');
            const content = document.getElementById(tabName + '-content');
            if (content) content.classList.add('active');

            if (tabName === 'archive') pageTitle.textContent = 'I. CODEV ARCHIVE';
            else if (tabName === 'ongoing') pageTitle.textContent = 'II. Ongoing Projects';
            else if (tabName === 'history') pageTitle.textContent = 'III. History';
        });
    });
}

function initYearList() {
    const yearItems = document.querySelectorAll('.year-item');
    yearItems.forEach(item => {
        item.addEventListener('click', function() {
            yearItems.forEach(y => y.classList.remove('active'));
            this.classList.add('active');
            loadProjectsForYear(this.getAttribute('data-year'));
        });
    });
    const defaultYear = document.querySelector('.year-item.active');
    if (defaultYear) loadProjectsForYear(defaultYear.getAttribute('data-year'));
}

function initAddYearButton() {
    const btnAddYear = document.getElementById('btn-add-year');
    if (btnAddYear) {
        btnAddYear.addEventListener('click', function() {
            const yearInput = prompt('새 연도를 입력하세요 (예: 2026):');
            if (yearInput && yearInput.trim() !== '') {
                const year = yearInput.trim();
                if (!/^\d{4}$/.test(year)) { alert('올바른 연도 형식을 입력해주세요 (예: 2026)'); return; }
                if (projectData[year]) { alert('이미 존재하는 연도입니다.'); return; }
                projectData[year] = { projects: [] };
                addYearToList(year);
                alert(`연도 "${year}"가 추가되었습니다.`);
            }
        });
    }
}

function addYearToList(year) {
    const yearList = document.querySelector('.year-list');
    const existingYearItem = yearList.querySelector(`[data-year="${year}"]`);
    if (existingYearItem) return;
    
    const yearItem = document.createElement('div');
    yearItem.className = 'year-item';
    yearItem.setAttribute('data-year', year);
    yearItem.innerHTML = `<span class="year-number">${year}</span><span class="year-info"></span>`;
    yearItem.addEventListener('click', function() {
        document.querySelectorAll('.year-item').forEach(y => y.classList.remove('active'));
        this.classList.add('active');
        loadProjectsForYear(this.getAttribute('data-year'));
    });

    const years = Array.from(yearList.querySelectorAll('.year-item')).map(item => item.getAttribute('data-year'));
    years.push(year);
    years.sort();
    const insertIndex = years.indexOf(year);

    if (insertIndex === years.length - 1) {
        yearList.appendChild(yearItem);
    } else {
        const nextYearElement = yearList.querySelector(`[data-year="${years[insertIndex + 1]}"]`);
        yearList.insertBefore(yearItem, nextYearElement);
    }
}

function initAddBrandButton() {
    const btnAddBrand = document.getElementById('btn-add-brand');
    if (btnAddBrand) {
        btnAddBrand.addEventListener('click', function() {
            const brandName = prompt('새 브랜드 이름을 입력하세요:');
            if (brandName && brandName.trim() !== '') {
                const activeYear = document.querySelector('.year-item.active');
                if (!activeYear) { alert('먼저 연도를 선택해주세요.'); return; }
                const year = activeYear.getAttribute('data-year');
                if (!projectData[year]) projectData[year] = { projects: [] };
                projectData[year].projects.push({ name: brandName.trim(), subProjects: [], products: { '_direct': [] } });
                loadProjectsForYear(year);
                alert(`브랜드 "${brandName.trim()}"가 ${year}년에 추가되었습니다.`);
            }
        });
    }
}

function loadProjectsForYear(year) {
    currentSelectedYear = year;
    const projectTree = document.getElementById('project-tree');
    if (!projectTree) return;
    projectTree.innerHTML = '';
    const yearData = projectData[year];
    if (!yearData) return;
    yearData.projects.forEach(project => projectTree.appendChild(createProjectItem(project)));
    
    document.getElementById('product-detail').innerHTML = '<p class="empty-message">브랜드 또는 하위 폴더를 선택하세요</p>';
}

function createProjectItem(project) {
    const div = document.createElement('div');
    div.className = 'project-item-main';
    const header = document.createElement('div');
    header.className = 'project-main-header';

    if (project.subProjects && project.subProjects.length > 0) {
        header.innerHTML = `<span class="toggle-icon">▶</span><span class="project-main-name">${project.name}</span><button class="btn-edit-brand" title="브랜드 이름 수정">✏️</button><button class="btn-add-subfolder" title="하위 폴더 추가">+</button>`;
    } else {
        header.innerHTML = `<span class="project-main-name">${project.name}</span><button class="btn-edit-brand" title="브랜드 이름 수정">✏️</button><button class="btn-add-subfolder" title="하위 폴더 추가">+</button>`;
    }

    const content = document.createElement('div');
    content.className = 'project-main-content';

    if (project.subProjects && project.subProjects.length > 0) {
        project.subProjects.forEach(subProject => {
            const subItem = document.createElement('div');
            subItem.className = 'sub-project-item';
            subItem.innerHTML = `<span class="sub-project-name">${subProject}</span><button class="btn-edit-subfolder" title="하위 폴더 이름 수정">✏️</button><button class="btn-add-product-sub" title="제품명 추가">+</button>`;

            subItem.querySelector('.sub-project-name').addEventListener('click', function(e) {
                e.stopPropagation();
                selectSubProject(subProject, subItem, project.name);
            });
            subItem.querySelector('.btn-edit-subfolder').addEventListener('click', function(e) {
                e.stopPropagation();
                editSubfolderName(project, subProject);
            });
            subItem.querySelector('.btn-add-product-sub').addEventListener('click', function(e) {
                e.stopPropagation();
                addProductToSubProject(project.name, subProject);
            });
            content.appendChild(subItem);
        });

        const toggleIcon = header.querySelector('.toggle-icon');
        if (toggleIcon) {
            header.addEventListener('click', function(e) {
                if (e.target.closest('.btn-add-subfolder') || e.target.closest('.btn-edit-brand')) return;
                const isExpanded = content.classList.contains('expanded');
                if (isExpanded) {
                    content.classList.remove('expanded');
                    toggleIcon.textContent = '▶';
                    header.classList.remove('active');
                } else {
                    content.classList.add('expanded');
                    toggleIcon.textContent = '▼';
                    header.classList.add('active');
                    
                    currentSelectedBrand = project.name;
                    currentSelectedSubProject = '_direct';
                    loadProductsForBrand(project.name);
                }
            });
        }
    } else {
        header.addEventListener('click', function(e) {
            if (e.target.closest('.btn-add-subfolder') || e.target.closest('.btn-edit-brand')) return;
            selectMainProject(project.name, header);
        });
    }

    header.querySelector('.btn-edit-brand')?.addEventListener('click', function(e) { e.stopPropagation(); editBrandName(project); });
    header.querySelector('.btn-add-subfolder')?.addEventListener('click', function(e) { e.stopPropagation(); addSubfolder(project); });

    div.appendChild(header);
    if (project.subProjects && project.subProjects.length > 0) div.appendChild(content);
    return div;
}

// ★★★ 제품의 파일 개수를 계산하는 함수 ★★★
function getProductFileCount(productName) {
    const productKey = productName;
    if (!releasedProductFiles[productKey]) return 0;
    
    let count = 0;
    const files = releasedProductFiles[productKey];
    if (files.reports) count += files.reports.filter(r => r.document).length;
    if (files.decisionDocument) count += 1;
    return count;
}

function loadProductsForBrand(brandName) {
    const productDetail = document.getElementById('product-detail');
    if (!productDetail) return;
    productDetail.innerHTML = '';

    const yearData = projectData[currentSelectedYear];
    if (!yearData) {
        productDetail.innerHTML = '<p class="empty-message">연도 데이터가 없습니다</p>';
        return;
    }

    const brand = yearData.projects.find(p => p.name === brandName);
    if (!brand) {
        productDetail.innerHTML = '<p class="empty-message">브랜드를 찾을 수 없습니다</p>';
        return;
    }

    if (!brand.products) brand.products = {};
    if (!brand.products['_direct']) brand.products['_direct'] = [];

    const products = brand.products['_direct'];

    if (products.length === 0) {
        productDetail.innerHTML = '<p class="empty-message">출시된 제품이 없습니다. 하위 폴더를 생성하거나 출시된 제품을 확인하세요.</p>';
        return;
    }

    products.forEach((productName, index) => {
        const fileCount = getProductFileCount(productName);
        const fileBadge = fileCount > 0 
            ? `<span class="file-count-badge"><span class="badge-icon">📎</span>${fileCount}개 파일</span>` 
            : '';
        
        const productItem = document.createElement('div');
        productItem.className = 'product-list-item';
        productItem.innerHTML = `
            <span class="product-icon">📦</span>
            <span class="product-name-text">${productName}</span>
            ${fileBadge}
            <button class="btn-delete-product" data-index="${index}" title="제품 삭제">×</button>
        `;

        productItem.addEventListener('click', function(e) {
            if (e.target.closest('.btn-delete-product')) return;
            document.querySelectorAll('.product-list-item').forEach(item => item.classList.remove('active'));
            this.classList.add('active');
            showReleasedProductModal(productName);
        });

        productItem.querySelector('.btn-delete-product').addEventListener('click', function(e) {
            e.stopPropagation();
            if (confirm(`제품명 "${productName}"을(를) 삭제하시겠습니까?`)) {
                products.splice(index, 1);
                delete releasedProductFiles[productName];
                loadProductsForBrand(brandName);
            }
        });

        productDetail.appendChild(productItem);
    });
}

function selectMainProject(projectName, headerElement) {
    document.querySelectorAll('.project-main-header').forEach(h => h.classList.remove('active'));
    document.querySelectorAll('.sub-project-item').forEach(item => item.classList.remove('active'));
    headerElement.classList.add('active');
    currentSelectedBrand = projectName;
    currentSelectedSubProject = '_direct';
    loadProductsForBrand(projectName);
}

function editBrandName(project) {
    const activeYear = document.querySelector('.year-item.active');
    if (!activeYear) { alert('연도를 선택해주세요.'); return; }
    const year = activeYear.getAttribute('data-year');
    const newName = prompt(`브랜드 이름을 수정하세요 (현재: ${project.name}):`, project.name);
    if (newName && newName.trim() !== '' && newName.trim() !== project.name) {
        const yearData = projectData[year];
        if (yearData) {
            const projectInData = yearData.projects.find(p => p.name === project.name);
            if (projectInData) {
                if (yearData.projects.some(p => p.name === newName.trim() && p !== projectInData)) { alert('이미 존재하는 브랜드 이름입니다.'); return; }
                projectInData.name = newName.trim();
                loadProjectsForYear(year);
                alert(`브랜드 이름이 변경되었습니다.`);
            }
        }
    }
}

function editSubfolderName(project, oldSubfolderName) {
    const activeYear = document.querySelector('.year-item.active');
    if (!activeYear) { alert('연도를 선택해주세요.'); return; }
    const year = activeYear.getAttribute('data-year');
    const newName = prompt(`하위 폴더 이름을 수정하세요 (현재: ${oldSubfolderName}):`, oldSubfolderName);
    if (newName && newName.trim() !== '' && newName.trim() !== oldSubfolderName) {
        const yearData = projectData[year];
        if (yearData) {
            const projectInData = yearData.projects.find(p => p.name === project.name);
            if (projectInData && projectInData.subProjects) {
                if (projectInData.subProjects.some(sp => sp === newName.trim() && sp !== oldSubfolderName)) { alert('이미 존재하는 하위 폴더 이름입니다.'); return; }
                const index = projectInData.subProjects.indexOf(oldSubfolderName);
                if (index !== -1) projectInData.subProjects[index] = newName.trim();
                if (projectInData.products && projectInData.products[oldSubfolderName]) {
                    projectInData.products[newName.trim()] = projectInData.products[oldSubfolderName];
                    delete projectInData.products[oldSubfolderName];
                }
                loadProjectsForYear(year);
            }
        }
    }
}

function addSubfolder(project) {
    const subfolderName = prompt(`"${project.name}"에 추가할 하위 폴더 이름을 입력하세요:`);
    if (subfolderName && subfolderName.trim() !== '') {
        const activeYear = document.querySelector('.year-item.active');
        if (!activeYear) { alert('연도를 선택해주세요.'); return; }
        const year = activeYear.getAttribute('data-year');
        const yearData = projectData[year];
        if (yearData) {
            const projectInData = yearData.projects.find(p => p.name === project.name);
            if (projectInData) {
                if (!projectInData.subProjects) projectInData.subProjects = [];
                projectInData.subProjects.push(subfolderName.trim());
                if (!projectInData.products) projectInData.products = { '_direct': [] };
                projectInData.products[subfolderName.trim()] = [];
                loadProjectsForYear(year);
            }
        }
    }
}

function selectSubProject(subProjectName, element, brandName) {
    document.querySelectorAll('.project-main-header').forEach(h => h.classList.remove('active'));
    document.querySelectorAll('.sub-project-item').forEach(item => item.classList.remove('active'));
    element.classList.add('active');
    const activeYear = document.querySelector('.year-item.active');
    if (activeYear) currentSelectedYear = activeYear.getAttribute('data-year');
    currentSelectedBrand = brandName;
    currentSelectedSubProject = subProjectName;
    loadProductsForSubProject(brandName, subProjectName);
}

function addProductToSubProject(brandName, subProjectName) {
    const activeYear = document.querySelector('.year-item.active');
    if (!activeYear) { alert('연도를 선택해주세요.'); return; }
    const year = activeYear.getAttribute('data-year');
    const productName = prompt(`"${subProjectName}"에 추가할 제품명을 입력하세요:`);
    if (productName && productName.trim() !== '') {
        const yearData = projectData[year];
        if (!yearData) return;
        const brand = yearData.projects.find(p => p.name === brandName);
        if (!brand) return;
        if (!brand.products) brand.products = { '_direct': [] };
        if (!brand.products[subProjectName]) brand.products[subProjectName] = [];
        if (brand.products[subProjectName].includes(productName.trim())) { alert('이미 존재하는 제품명입니다.'); return; }
        brand.products[subProjectName].push(productName.trim());
        currentSelectedYear = year;
        currentSelectedBrand = brandName;
        currentSelectedSubProject = subProjectName;
        loadProductsForSubProject(brandName, subProjectName);
    }
}

function loadProductsForSubProject(brandName, subProjectName) {
    const productDetail = document.getElementById('product-detail');
    if (!productDetail) return;
    productDetail.innerHTML = '';
    const yearData = projectData[currentSelectedYear];
    if (!yearData) { productDetail.innerHTML = '<p class="empty-message">연도 데이터가 없습니다</p>'; return; }
    const brand = yearData.projects.find(p => p.name === brandName);
    if (!brand) { productDetail.innerHTML = '<p class="empty-message">브랜드를 찾을 수 없습니다</p>'; return; }
    if (!brand.products) brand.products = { '_direct': [] };
    if (!brand.products[subProjectName]) brand.products[subProjectName] = [];
    const products = brand.products[subProjectName];
    if (products.length === 0) { productDetail.innerHTML = '<p class="empty-message">하위 폴더의 "+" 버튼을 클릭하여 제품명을 추가하세요</p>'; return; }

    products.forEach((productName, index) => {
        const fileCount = getProductFileCount(productName);
        const fileBadge = fileCount > 0 
            ? `<span class="file-count-badge"><span class="badge-icon">📎</span>${fileCount}개 파일</span>` 
            : '';
        
        const productItem = document.createElement('div');
        productItem.className = 'product-list-item';
        productItem.innerHTML = `
            <span class="product-icon">📦</span>
            <span class="product-name-text">${productName}</span>
            ${fileBadge}
            <button class="btn-delete-product" data-index="${index}" title="제품 삭제">×</button>
        `;
        productItem.addEventListener('click', function(e) {
            if (e.target.closest('.btn-delete-product')) return;
            document.querySelectorAll('.product-list-item').forEach(item => item.classList.remove('active'));
            this.classList.add('active');
            showReleasedProductModal(productName);
        });
        productItem.querySelector('.btn-delete-product').addEventListener('click', function(e) {
            e.stopPropagation();
            if (confirm(`제품명 "${productName}"을(를) 삭제하시겠습니까?`)) {
                products.splice(index, 1);
                delete releasedProductFiles[productName];
                loadProductsForSubProject(brandName, subProjectName);
            }
        });
        productDetail.appendChild(productItem);
    });
}

// ★★★ 출시된 제품의 파일을 보여주는 모달 ★★★
function showReleasedProductModal(productName) {
    document.getElementById('released-product-modal')?.remove();
    
    const productFiles = releasedProductFiles[productName];
    
    const modal = document.createElement('div');
    modal.id = 'released-product-modal';
    modal.className = 'modal-overlay';
    
    const modalContent = document.createElement('div');
    modalContent.className = 'modal-content';
    
    const modalHeader = document.createElement('div');
    modalHeader.className = 'modal-header';
    modalHeader.innerHTML = `
        <h3>📦 ${productName}</h3>
        <div class="signature-label">출시된 제품 문서</div>
        <button class="btn-close-modal" title="닫기">×</button>
    `;
    
    const modalBody = document.createElement('div');
    modalBody.className = 'modal-body';
    
    if (!productFiles) {
        modalBody.innerHTML = '<p class="empty-message">등록된 파일이 없습니다.</p>';
    } else {
        // 프로젝트 정보 섹션
        if (productFiles.projectInfo) {
            const infoSection = document.createElement('div');
            infoSection.className = 'modal-section';
            infoSection.innerHTML = `
                <div class="modal-section-title"><span class="section-icon">📋</span>프로젝트 정보</div>
                <div style="background: #f5f5f5; padding: 15px; border-radius: 8px; font-size: 13px; line-height: 1.8;">
                    <div><strong>브랜드:</strong> ${productFiles.projectInfo.brand || '-'}</div>
                    <div><strong>프로젝트명:</strong> ${productFiles.projectInfo.project || '-'}</div>
                    <div><strong>Gate:</strong> ${productFiles.projectInfo.gate || '-'}</div>
                    <div><strong>출시일:</strong> ${productFiles.projectInfo.year || '-'}</div>
                    <div><strong>서명일:</strong> ${productFiles.projectInfo.signatureDate || '-'}</div>
                    <div><strong>홀딩 상태:</strong> ${productFiles.projectInfo.holdingStatus || '-'}</div>
                    ${productFiles.projectInfo.holdingReason ? `<div><strong>홀딩 사유:</strong> ${productFiles.projectInfo.holdingReason}</div>` : ''}
                </div>
            `;
            modalBody.appendChild(infoSection);
        }
        
        // 보고서 문서 섹션
        if (productFiles.reports && productFiles.reports.length > 0) {
            const reportsSection = document.createElement('div');
            reportsSection.className = 'modal-section';
            reportsSection.innerHTML = `<div class="modal-section-title"><span class="section-icon">📄</span>보고서 문서</div>`;
            
            productFiles.reports.forEach((report, index) => {
                if (report.document) {
                    const fileItem = document.createElement('div');
                    fileItem.className = 'released-file-item';
                    fileItem.innerHTML = `
                        <span class="file-icon">📎</span>
                        <div class="file-details">
                            <div class="file-title">${report.document}</div>
                            <div class="file-meta">
                                <span>📅 보고일: ${report.reportDate || '-'}</span>
                                ${report.meetingNote ? `<span>📝 ${report.meetingNote}</span>` : ''}
                            </div>
                        </div>
                        <button class="btn-download" onclick="downloadFile('${productName}', 'report', ${index})">
                            <span>⬇️</span> 다운로드
                        </button>
                    `;
                    reportsSection.appendChild(fileItem);
                }
            });
            
            if (reportsSection.querySelectorAll('.released-file-item').length > 0) {
                modalBody.appendChild(reportsSection);
            }
        }
        
        // REQUEST DECISION 문서 섹션
        if (productFiles.decisionDocument) {
            const decisionSection = document.createElement('div');
            decisionSection.className = 'modal-section';
            decisionSection.innerHTML = `
                <div class="modal-section-title"><span class="section-icon">✍️</span>REQUEST DECISION</div>
                <div class="released-file-item">
                    <span class="file-icon">📋</span>
                    <div class="file-details">
                        <div class="file-title">${productFiles.decisionDocument}</div>
                        <div class="file-meta">
                            <span>📅 서명일: ${productFiles.projectInfo?.signatureDate || '-'}</span>
                        </div>
                    </div>
                    <button class="btn-download" onclick="downloadFile('${productName}', 'decision', 0)">
                        <span>⬇️</span> 다운로드
                    </button>
                </div>
            `;
            modalBody.appendChild(decisionSection);
        }
        
        // 파일이 하나도 없는 경우
        if (modalBody.querySelectorAll('.modal-section').length === 0 || 
            (modalBody.querySelectorAll('.released-file-item').length === 0 && !productFiles.projectInfo)) {
            modalBody.innerHTML = '<p class="empty-message">등록된 파일이 없습니다.</p>';
        }
    }
    
    modalContent.appendChild(modalHeader);
    modalContent.appendChild(modalBody);
    modal.appendChild(modalContent);
    
    modalHeader.querySelector('.btn-close-modal').addEventListener('click', () => modal.remove());
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    document.addEventListener('keydown', function handler(e) { 
        if (e.key === 'Escape') { 
            modal.remove(); 
            document.removeEventListener('keydown', handler); 
        } 
    });
    
    document.body.appendChild(modal);
}

// ★★★ 파일 다운로드 함수 ★★★
function downloadFile(productName, type, index) {
    const productFiles = releasedProductFiles[productName];
    if (!productFiles) {
        alert('파일 정보를 찾을 수 없습니다.');
        return;
    }
    
    let fileKey = '';
    let fileName = '';
    
    if (type === 'report') {
        const report = productFiles.reports[index];
        if (report && report.document) {
            fileKey = `${productName}|report|${index}`;
            fileName = report.document;
        }
    } else if (type === 'decision') {
        fileKey = `${productName}|decision`;
        fileName = productFiles.decisionDocument;
    }
    
    const fileData = fileStorage[fileKey];
    
    if (fileData && fileData.file) {
        // 실제 파일이 있는 경우 다운로드
        const url = URL.createObjectURL(fileData.file);
        const a = document.createElement('a');
        a.href = url;
        a.download = fileName;
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        URL.revokeObjectURL(url);
    } else {
        // 파일이 없는 경우 (데모용)
        alert(`파일 "${fileName}"을 다운로드합니다.\n\n(실제 환경에서는 서버에서 파일을 가져옵니다)`);
    }
}

function formatFileSize(bytes) {
    if (bytes === 0) return '0 Bytes';
    const k = 1024;
    const sizes = ['Bytes', 'KB', 'MB', 'GB'];
    const i = Math.floor(Math.log(bytes) / Math.log(k));
    return Math.round(bytes / Math.pow(k, i) * 100) / 100 + ' ' + sizes[i];
}

function handleTableDocUpload(cell) {

function saveOngoingProject() {
    const brand = document.getElementById('ongoing-brand').value;
    const product = document.getElementById('ongoing-product').value;
    const project = document.getElementById('ongoing-project').value;
    const gate = document.getElementById('ongoing-gate').value;
    const year = document.getElementById('ongoing-year').value;
    const tbd = document.getElementById('ongoing-tbd').checked;

    if (!brand) { alert('브랜드를 선택해주세요.'); return; }
    if (!product) { alert('제품명을 입력해주세요.'); return; }
    if (!project) { alert('프로젝트 명을 입력해주세요.'); return; }
    if (!gate) { alert('Gate를 선택해주세요.'); return; }
    if (!year && !tbd) { alert('출시 년도를 선택하거나 TBD를 체크해주세요.'); return; }

    const tableBody = document.getElementById('report-table-body');
    const rows = tableBody.querySelectorAll('tr');
    const reportData = [];
    
    rows.forEach((row, rowIndex) => {
        const reportDate = row.querySelector('input[type="date"]').value;
        const docCell = row.querySelector('.doc-upload-cell');
        const docFileName = docCell.dataset.fileName || '';
        const docFile = docCell._fileObject || null;
        const meetingNote = row.querySelector('.table-input[placeholder="회의록 입력"]').value;
        
        if (reportDate || docFileName || meetingNote) {
            reportData.push({ 
                reportDate, 
                document: docFileName, 
                meetingNote,
                file: docFile,
                rowIndex 
            });
        }
    });

    const signatureDate = document.querySelector('.decision-input').value;
    const decisionCell = document.querySelector('.decision-section .doc-upload-cell');
    const decisionDocument = decisionCell ? decisionCell.dataset.fileName || '' : '';
    const decisionFile = decisionCell ? decisionCell._fileObject || null : null;
    const holdingStatus = document.querySelector('.holding-select').value;
    const holdingReason = document.querySelector('.holding-input').value;

    const record = {
        id: historyRecords.length + 1,
        brand, product, project, gate, year, tbd,
        reports: reportData,
        signatureDate, 
        decisionDocument,
        decisionFile,
        holdingStatus, 
        holdingReason,
        released: false
    };

    historyRecords.push(record);
    updateHistoryTable();
    alert('저장되었습니다!');
    if (confirm('입력 내용을 초기화하시겠습니까?')) clearOngoingForm();
}

// ★★★★★ 출시 기능 - 파일도 함께 이동 ★★★★★
function releaseProject(recordId) {
    const record = historyRecords.find(r => r.id === recordId);
    if (!record) {
        alert('레코드를 찾을 수 없습니다.');
        return;
    }

    if (record.gate !== 'Closure') {
        alert('Closure 단계에서만 출시가 가능합니다.');
        return;
    }

    if (!record.year) {
        alert('출시 년도가 설정되지 않았습니다.');
        return;
    }

    // 파일 개수 계산
    let fileCount = 0;
    if (record.reports) {
        fileCount += record.reports.filter(r => r.document).length;
    }
    if (record.decisionDocument) fileCount++;

    const confirmMsg = `프로젝트 "${record.brand} - ${record.product}"를 ARCHIVE에 출시하시겠습니까?\n\n` +
        `출시 연도: ${record.year}\n` +
        `브랜드: ${record.brand}\n` +
        `제품명: ${record.product}\n` +
        `📎 함께 이동할 파일: ${fileCount}개`;

    if (confirm(confirmMsg)) {
        const releaseYear = new Date(record.year).getFullYear().toString();

        // ARCHIVE에 데이터 추가
        if (!projectData[releaseYear]) {
            projectData[releaseYear] = { projects: [] };
            addYearToList(releaseYear);
        }

        const yearData = projectData[releaseYear];

        // 브랜드 찾기 또는 생성
        let brand = yearData.projects.find(p => p.name === record.brand);
        if (!brand) {
            brand = { name: record.brand, subProjects: [], products: { '_direct': [] } };
            yearData.projects.push(brand);
        }

        if (!brand.products) {
            brand.products = { '_direct': [] };
        }
        if (!brand.products['_direct']) {
            brand.products['_direct'] = [];
        }

        // 제품명 추가 (중복 방지)
        if (!brand.products['_direct'].includes(record.product)) {
            brand.products['_direct'].push(record.product);
        }

        // ★★★ 파일 정보를 releasedProductFiles에 저장 ★★★
        releasedProductFiles[record.product] = {
            projectInfo: {
                brand: record.brand,
                project: record.project,
                gate: record.gate,
                year: record.year,
                signatureDate: record.signatureDate,
                holdingStatus: record.holdingStatus,
                holdingReason: record.holdingReason
            },
            reports: record.reports.map((report, index) => ({
                reportDate: report.reportDate,
                document: report.document,
                meetingNote: report.meetingNote
            })),
            decisionDocument: record.decisionDocument
        };

        // ★★★ 파일 저장소에 실제 파일 객체 저장 ★★★
        record.reports.forEach((report, index) => {
            if (report.file) {
                const fileKey = `${record.product}|report|${index}`;
                fileStorage[fileKey] = {
                    file: report.file,
                    name: report.document,
                    uploadDate: new Date().toISOString()
                };
            }
        });

        if (record.decisionFile) {
            const fileKey = `${record.product}|decision`;
            fileStorage[fileKey] = {
                file: record.decisionFile,
                name: record.decisionDocument,
                uploadDate: new Date().toISOString()
            };
        }

        // 출시 상태 업데이트
        record.released = true;

        // 테이블 새로고침
        updateHistoryTable();

        // 성공 메시지
        alert(`✅ "${record.product}"가 ${releaseYear}년 ARCHIVE에 출시되었습니다!\n\n📎 ${fileCount}개의 파일이 함께 이동되었습니다.\n\nARCHIVE 탭에서 확인하실 수 있습니다.`);

        // ARCHIVE 탭으로 자동 이동
        if (confirm('ARCHIVE 탭으로 이동하시겠습니까?')) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.tab-content').forEach(tc => tc.classList.remove('active'));
            document.querySelector('[data-tab="archive"]').classList.add('active');
            document.getElementById('archive-content').classList.add('active');
            document.getElementById('page-title').textContent = 'I. CODEV ARCHIVE';

            document.querySelectorAll('.year-item').forEach(y => y.classList.remove('active'));
            const targetYearItem = document.querySelector(`.year-item[data-year="${releaseYear}"]`);
            if (targetYearItem) {
                targetYearItem.classList.add('active');
                targetYearItem.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
            }

            currentSelectedYear = releaseYear;
            loadProjectsForYear(releaseYear);

            setTimeout(() => {
                const projectHeaders = document.querySelectorAll('.project-main-header');
                projectHeaders.forEach(header => {
                    const brandNameElement = header.querySelector('.project-main-name');
                    if (brandNameElement && brandNameElement.textContent === record.brand) {
                        header.classList.add('active');
                        header.scrollIntoView({ behavior: 'smooth', block: 'center' });
                        currentSelectedBrand = record.brand;
                        currentSelectedSubProject = '_direct';
                        loadProductsForBrand(record.brand);

                        setTimeout(() => {
                            const productItems = document.querySelectorAll('.product-list-item');
                            productItems.forEach(item => {
                                const productNameElement = item.querySelector('.product-name-text');
                                if (productNameElement && productNameElement.textContent === record.product) {
                                    item.classList.add('active');
                                    item.scrollIntoView({ behavior: 'smooth', block: 'center' });
                                }
                            });
                        }, 300);
                    }
                });
            }, 500);
        }
    }
}

function deleteHistoryRecord(recordId) {
    const record = historyRecords.find(r => r.id === recordId);
    if (!record) { alert('기록을 찾을 수 없습니다.'); return; }
    if (confirm(`"${record.brand} - ${record.product}" 기록을 삭제하시겠습니까?`)) {
        const index = historyRecords.findIndex(r => r.id === recordId);
        if (index !== -1) {
            historyRecords.splice(index, 1);
            historyRecords.forEach((r, i) => { r.id = i + 1; });
            updateHistoryTable();
            alert('기록이 삭제되었습니다.');
        }
    }
}

function exportToExcel() {
    if (historyRecords.length === 0) { alert('저장된 기록이 없습니다.'); return; }

    let csv = '\uFEFF';
    csv += '번호,브랜드,제품명,프로젝트 명,Gate,출시 년도,TBD,보고날짜,문서,회의록,서명날짜,홀딩 상태,홀딩 사유,출시상태\n';

    historyRecords.forEach(record => {
        const releaseStatus = record.released ? '출시완료' : (record.gate === 'Closure' ? '미출시' : '-');
        if (record.reports.length > 0) {
            record.reports.forEach((report, index) => {
                if (index === 0) {
                    csv += `${record.id},"${record.brand}","${record.product}","${record.project}","${record.gate}","${record.year}","${record.tbd ? 'TBD' : ''}","${report.reportDate || '-'}","${report.document || '-'}","${report.meetingNote || '-'}","${record.signatureDate || '-'}","${record.holdingStatus || '-'}","${record.holdingReason || '-'}","${releaseStatus}"\n`;
                } else {
                    csv += `,,,,,,,"${report.reportDate || '-'}","${report.document || '-'}","${report.meetingNote || '-'}",,,,\n`;
                }
            });
        } else {
            csv += `${record.id},"${record.brand}","${record.product}","${record.project}","${record.gate}","${record.year}","${record.tbd ? 'TBD' : ''}","-","-","-","${record.signatureDate || '-'}","${record.holdingStatus || '-'}","${record.holdingReason || '-'}","${releaseStatus}"\n`;
        }
    });

    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const link = document.createElement('a');
    link.setAttribute('href', URL.createObjectURL(blob));
    link.setAttribute('download', `CODEV_History_${new Date().toISOString().slice(0, 19).replace(/:/g, '-')}.csv`);
    link.style.visibility = 'hidden';
    document.body.appendChild(link);
    link.click();
    document.body.removeChild(link);
    alert('Excel 파일이 다운로드되었습니다.');
}

                <td><input type="date" class="table-input" value="${report.reportDate || ''}"></td>
                <td>
                    <div class="doc-upload-cell" data-file-name="${report.document || ''}">
                        <button class="btn-upload-doc-table ${report.document ? 'uploaded' : ''}">${report.document ? '재선택' : '파일 선택'}</button>
                        <span class="doc-file-name">${report.document || ''}</span>
                        <button class="btn-delete-doc-table" style="display: ${report.document ? 'flex' : 'none'};">×</button>
                    </div>
                </td>
                <td><input type="text" class="table-input" placeholder="회의록 입력" value="${report.meetingNote || ''}"></td>
                <td><button class="btn-delete-row" onclick="deleteReportRow(this)">−</button></td>
            `;
            
            // 파일 객체 복원
            if (report.file) {
                newRow.querySelector('.doc-upload-cell')._fileObject = report.file;
            }
            
            tbody.appendChild(newRow);
        });
    } else {
        addReportRow();
    }

    const signatureInput = document.querySelector('.decision-input');
    if (signatureInput) signatureInput.value = record.signatureDate || '';

    // REQUEST DECISION 파일 복원
    const decisionCell = document.querySelector('.decision-section .doc-upload-cell');
    if (decisionCell && record.decisionDocument) {
        decisionCell.dataset.fileName = record.decisionDocument;
        decisionCell.querySelector('.doc-file-name').textContent = record.decisionDocument;
        decisionCell.querySelector('.btn-upload-doc-table').textContent = '재선택';
        decisionCell.querySelector('.btn-upload-doc-table').classList.add('uploaded');
        decisionCell.querySelector('.btn-delete-doc-table').style.display = 'flex';
        if (record.decisionFile) {
            decisionCell._fileObject = record.decisionFile;
        }
    }

    const holdingSelect = document.querySelector('.holding-select');
    if (holdingSelect) holdingSelect.value = record.holdingStatus || '';

    const holdingInput = document.querySelector('.holding-input');
    if (holdingInput) holdingInput.value = record.holdingReason || '';

    editingRecordId = recordId;
    setEditMode(true);
    showEditModeIndicator(record);

    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setEditMode(isEditMode) {
    const saveBtn = document.getElementById('btn-save');
    const updateBtn = document.getElementById('btn-update');
    const cancelBtn = document.getElementById('btn-cancel-edit');

    if (isEditMode) {
        saveBtn.style.display = 'none';
        updateBtn.style.display = 'inline-block';
        cancelBtn.style.display = 'inline-block';
    } else {
        saveBtn.style.display = 'inline-block';
        updateBtn.style.display = 'none';
        cancelBtn.style.display = 'none';
        editingRecordId = null;
        removeEditModeIndicator();
    }
}

function showEditModeIndicator(record) {
    removeEditModeIndicator();

    const indicator = document.createElement('div');
    indicator.className = 'edit-mode-indicator';
    indicator.id = 'edit-mode-indicator';
    indicator.innerHTML = `
        <span class="icon">✏️</span>
        <span class="text">수정 모드: [${record.brand}] ${record.project} (번호: ${record.id})</span>
    `;

    const container = document.querySelector('.ongoing-container');
    const title = container.querySelector('.panel-title');
    title.insertAdjacentElement('afterend', indicator);
}

function removeEditModeIndicator() {
    const existing = document.getElementById('edit-mode-indicator');
    if (existing) existing.remove();
}

function updateHistoryRecord() {
    if (!editingRecordId) {
        alert('수정 중인 레코드가 없습니다.');
        return;
    }

    const recordIndex = historyRecords.findIndex(r => r.id === editingRecordId);
    if (recordIndex === -1) {
        alert('레코드를 찾을 수 없습니다.');
        return;
    }

    const brand = document.getElementById('ongoing-brand').value;
    const product = document.getElementById('ongoing-product').value;
    const project = document.getElementById('ongoing-project').value;
    const gate = document.getElementById('ongoing-gate').value;
    const year = document.getElementById('ongoing-year').value;
    const tbd = document.getElementById('ongoing-tbd').checked;

    const reportRows = document.querySelectorAll('#report-table-body tr');
    const reportData = [];
    reportRows.forEach((row, rowIndex) => {
        const dateInput = row.querySelector('input[type="date"]');
        const docCell = row.querySelector('.doc-upload-cell');
        const noteInput = row.querySelector('input[type="text"]');

        if (dateInput) {
            const docFileName = docCell ? (docCell.dataset.fileName || docCell.querySelector('.doc-file-name')?.textContent || '') : '';
            const docFile = docCell ? docCell._fileObject || null : null;
            reportData.push({
                reportDate: dateInput.value,
                document: docFileName,
                meetingNote: noteInput ? noteInput.value : '',
                file: docFile,
                rowIndex
            });
        }
    });

    const signatureDate = document.querySelector('.decision-input')?.value || '';
    const decisionCell = document.querySelector('.decision-section .doc-upload-cell');
    const decisionDocument = decisionCell ? (decisionCell.dataset.fileName || '') : '';
    const decisionFile = decisionCell ? decisionCell._fileObject || null : null;
    const holdingStatus = document.querySelector('.holding-select')?.value || '';
    const holdingReason = document.querySelector('.holding-input')?.value || '';

    historyRecords[recordIndex] = {
        ...historyRecords[recordIndex],
        brand, product, project, gate, year, tbd,
        reports: reportData,
        signatureDate, 
        decisionDocument,
        decisionFile,
        holdingStatus, 
        holdingReason
    };

    updateHistoryTable();
    setEditMode(false);

    alert('변경 사항이 저장되었습니다!');

    if (confirm('입력 내용을 초기화하시겠습니까?')) {
        clearOngoingForm();
    }
}

function cancelEdit() {
    if (confirm('수정을 취소하시겠습니까? 변경 사항은 저장되지 않습니다.')) {
        setEditMode(false);
        clearOngoingForm();
    }
}

document.addEventListener('DOMContentLoaded', function() {
    const updateBtn = document.getElementById('btn-update');
    const cancelBtn = document.getElementById('btn-cancel-edit');

    if (updateBtn) {
        updateBtn.addEventListener('click', updateHistoryRecord);
    }
    if (cancelBtn) {
        cancelBtn.addEventListener('click', cancelEdit);
    }
});

</script>
</body>
</html>
