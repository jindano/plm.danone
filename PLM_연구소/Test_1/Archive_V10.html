<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEV ARCHIVE</title>
    <style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    font-family: Arial, sans-serif;
    background-color: #f5f5f5;
    padding: 20px;
}

.container {
    max-width: 1400px;
    margin: 0 auto;
    background-color: white;
    padding: 30px;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

.title {
    font-size: 20px;
    font-weight: normal;
    margin-bottom: 20px;
    color: #333;
}

.tabs {
    display: flex;
    gap: 0;
    margin-bottom: 0;
    border-bottom: 2px solid #ddd;
}

.tab {
    padding: 12px 40px;
    border: none;
    background-color: #e8e8e8;
    cursor: pointer;
    font-size: 16px;
    font-weight: normal;
    color: #333;
    border-top-left-radius: 8px;
    border-top-right-radius: 8px;
    border: 1px solid #ddd;
    border-bottom: none;
    transition: all 0.3s ease;
    clip-path: polygon(8% 0%, 92% 0%, 100% 100%, 0% 100%);
    margin-right: 5px;
}

.tab:hover { background-color: #d5d5d5; }

.tab.active {
    background-color: #8BC34A;
    color: white;
    font-weight: bold;
    border-color: #8BC34A;
}

.content-area {
    display: none;
    border: 2px solid #333;
    border-top: none;
    min-height: 600px;
}

.content-area.active { display: flex; }

#archive-content { display: none; }
#archive-content.active { display: flex; }
#archive-content .left-panel { width: 220px; }
#archive-content .middle-panel {
    width: 280px;
    border-right: 2px solid #333;
    padding: 20px;
    background-color: #fafafa;
}
#archive-content .right-panel { flex: 1; }

#ongoing-content, #history-content {
    padding: 30px;
    background-color: white;
}

.ongoing-container, .history-container { max-width: 1200px; }

.empty-message {
    text-align: center;
    color: #999;
    padding: 40px;
    font-size: 14px;
}

.tab-content { display: none; }
.tab-content.active { display: flex; }

.panel-title {
    font-size: 16px;
    font-weight: bold;
    color: #333;
    margin-bottom: 15px;
    padding-bottom: 10px;
    border-bottom: 2px solid #8BC34A;
}

.panel-header-with-button {
    display: flex;
    justify-content: space-between;
    align-items: center;
}

.panel-header-with-button .panel-title {
    margin-bottom: 15px;
    flex: 1;
}

.btn-add-folder {
    width: 32px;
    height: 32px;
    border: 2px solid #8BC34A;
    background-color: white;
    color: #8BC34A;
    border-radius: 6px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.3s ease;
    font-size: 20px;
    font-weight: bold;
    margin-bottom: 15px;
}

.btn-add-folder:hover {
    background-color: #8BC34A;
    color: white;
    transform: scale(1.1);
}

.left-panel {
    width: 280px;
    border-right: 2px solid #333;
    padding: 20px;
    background-color: #fafafa;
    display: flex;
    flex-direction: column;
}

.year-list {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 10px;
}

.year-item {
    padding: 15px;
    background-color: white;
    border: 1px solid #ddd;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    flex-direction: column;
    gap: 5px;
}

.year-item:hover {
    border-color: #8BC34A;
    box-shadow: 0 2px 8px rgba(139, 195, 74, 0.2);
    transform: translateX(3px);
}

.year-item.active {
    border: 2px solid #8BC34A;
    background-color: #f1f8e9;
}

.year-number {
    font-size: 20px;
    font-weight: bold;
    color: #333;
}

.year-info { font-size: 13px; color: #666; }

.toggle-icon {
    display: inline-block;
    width: 16px;
    font-size: 12px;
    transition: transform 0.3s ease;
}

.footer-note {
    margin-top: 20px;
    padding-top: 15px;
    border-top: 1px solid #ddd;
    font-size: 14px;
    color: #666;
}

.right-panel {
    flex: 1;
    padding: 20px 30px;
    background-color: white;
    overflow-y: auto;
}

.project-tree {
    display: flex;
    flex-direction: column;
    gap: 12px;
}

.project-item-main {
    border: 1px solid #ddd;
    border-radius: 6px;
    overflow: hidden;
}

.project-main-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 12px 15px;
    background-color: #f5f5f5;
    cursor: pointer;
    user-select: none;
    transition: background-color 0.3s ease;
}

.project-main-header:hover { background-color: #e8f5e9; }
.project-main-header.active { background-color: #8BC34A; color: white; }

.project-main-name {
    font-size: 15px;
    font-weight: bold;
    flex: 1;
}

.btn-edit-brand {
    width: 24px;
    height: 24px;
    border: 1.5px solid #FF9800;
    background-color: white;
    color: #FF9800;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-size: 12px;
    opacity: 0;
}

.project-main-header:hover .btn-edit-brand { opacity: 1; }
.btn-edit-brand:hover { background-color: #FF9800; color: white; transform: scale(1.1); }
.project-main-header.active .btn-edit-brand { border-color: white; color: white; background-color: transparent; opacity: 1; }

.btn-add-subfolder {
    width: 24px;
    height: 24px;
    border: 1.5px solid #8BC34A;
    background-color: white;
    color: #8BC34A;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: all 0.2s ease;
    font-size: 16px;
    font-weight: bold;
}

.btn-add-subfolder:hover { background-color: #8BC34A; color: white; transform: scale(1.1); }
.project-main-header.active .btn-add-subfolder { border-color: white; color: white; background-color: transparent; }

.project-main-content {
    max-height: 0;
    overflow: hidden;
    transition: max-height 0.3s ease;
    background-color: white;
}

.project-main-content.expanded { max-height: 300px; }

.sub-project-item {
    padding: 10px 15px 10px 35px;
    border-top: 1px solid #f0f0f0;
    cursor: pointer;
    transition: background-color 0.2s ease;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 8px;
}

.sub-project-item:hover { background-color: #f9f9f9; }
.sub-project-item.active { background-color: #e8f5e9; border-left: 3px solid #8BC34A; }

.sub-project-name { flex: 1; font-size: 14px; color: #555; }

.btn-edit-subfolder {
    width: 22px;
    height: 22px;
    border: 1.5px solid #FF9800;
    background-color: white;
    color: #FF9800;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    opacity: 0;
}

.sub-project-item:hover .btn-edit-subfolder { opacity: 1; }
.btn-edit-subfolder:hover { background-color: #FF9800; color: white; }

.btn-add-product-sub {
    width: 22px;
    height: 22px;
    border: 1.5px solid #8BC34A;
    background-color: white;
    color: #8BC34A;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 14px;
    font-weight: bold;
    opacity: 0;
}

.sub-project-item:hover .btn-add-product-sub { opacity: 1; }
.btn-add-product-sub:hover { background-color: #8BC34A; color: white; }
.sub-project-item.active .btn-add-product-sub { opacity: 1; }

.product-detail {
    display: flex;
    flex-direction: column;
    gap: 15px;
}

.product-list-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 15px 18px;
    background-color: #f9f9f9;
    border: 2px solid #e0e0e0;
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.3s ease;
}

.product-list-item:hover {
    background-color: #e8f5e9;
    border-color: #8BC34A;
    transform: translateX(5px);
}

.product-list-item.active {
    background-color: #e8f5e9;
    border-color: #8BC34A;
    box-shadow: 0 2px 8px rgba(139, 195, 74, 0.3);
}

.product-icon { font-size: 24px; }
.product-name-text { font-size: 15px; font-weight: 600; color: #333; flex: 1; }
.product-list-item.active .product-name-text { color: #558B2F; }

.file-count-badge {
    background: linear-gradient(135deg, #4CAF50 0%, #388E3C 100%);
    color: white;
    font-size: 11px;
    font-weight: bold;
    padding: 3px 8px;
    border-radius: 12px;
    margin-left: 8px;
}

.btn-delete-product {
    width: 28px;
    height: 28px;
    border: 1.5px solid #f44336;
    background-color: white;
    color: #f44336;
    border-radius: 4px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    font-weight: bold;
    opacity: 0;
}

.product-list-item:hover .btn-delete-product { opacity: 1; }
.btn-delete-product:hover { background-color: #f44336; color: white; }

/* ONGOING CSS */
.ongoing-container { width: 100%; padding: 10px; }
.filter-section { margin-bottom: 20px; }

.filter-row {
    display: flex;
    gap: 15px;
    flex-wrap: wrap;
    align-items: flex-end;
}

.filter-group {
    display: flex;
    flex-direction: column;
    gap: 5px;
    min-width: 150px;
}

.filter-group label { font-size: 13px; font-weight: 600; color: #333; }

.filter-select, .filter-input {
    padding: 8px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 14px;
    outline: none;
    transition: all 0.3s ease;
}

.filter-select:focus, .filter-input:focus { border-color: #8BC34A; }
.filter-date { width: 150px; }

.filter-input:disabled, .filter-date:disabled {
    background-color: #f0f0f0;
    border-color: #ccc;
    color: #999;
    cursor: not-allowed;
    opacity: 0.7;
}

.filter-group.disabled label { color: #999; }
.filter-group.disabled::after {
    content: '(TBD 선택됨)';
    font-size: 11px;
    color: #FF9800;
    margin-top: 2px;
}

.manager-group { min-width: 180px; }

.manager-input {
    padding: 8px 12px;
    border: 2px solid #9C27B0;
    border-radius: 6px;
    font-size: 14px;
    outline: none;
    background-color: #faf5fc;
}

.manager-input:focus {
    border-color: #7B1FA2;
    box-shadow: 0 0 8px rgba(156, 39, 176, 0.3);
    background-color: white;
}

.manager-input::placeholder { color: #BA68C8; }
.manager-group label { color: #7B1FA2; font-weight: 700; }
.manager-group label::before { content: '👤 '; }

.tbd-group { min-width: 100px; }

.tbd-checkbox-container {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    background-color: #fff8e1;
    border: 1px solid #FFE082;
    border-radius: 6px;
}

.tbd-checkbox-container:hover { background-color: #ffecb3; border-color: #FFD54F; }
.tbd-checkbox-container.active { background-color: #FF9800; border-color: #FF9800; }
.tbd-checkbox-container.active .tbd-label { color: white; font-weight: 700; }

.tbd-checkbox { width: 18px; height: 18px; cursor: pointer; accent-color: #FF9800; }
.tbd-label { font-size: 13px; color: #F57C00; cursor: pointer; font-weight: 600; }

.report-table { margin-bottom: 20px; overflow-x: auto; }
.report-table table { width: 100%; border-collapse: collapse; }
.report-table th, .report-table td { padding: 10px; border: 1px solid #ddd; text-align: left; }
.report-table th { background-color: #f5f5f5; font-weight: 600; font-size: 13px; }

.report-table .table-input {
    width: 100%;
    padding: 6px 8px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
}

.report-table .table-input:focus { border-color: #8BC34A; }

.doc-upload-cell {
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
}

.btn-upload-doc-table {
    padding: 5px 12px;
    border: 1px solid #8BC34A;
    background-color: white;
    color: #8BC34A;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
    white-space: nowrap;
}

.btn-upload-doc-table:hover { background-color: #8BC34A; color: white; }
.btn-upload-doc-table.uploaded { background-color: #e8f5e9; border-color: #4CAF50; color: #4CAF50; }

.btn-upload-doc-table:disabled {
    background-color: #f0f0f0;
    border-color: #ccc;
    color: #999;
    cursor: not-allowed;
}

.btn-upload-doc-table:disabled:hover { background-color: #f0f0f0; color: #999; }

.doc-file-name {
    font-size: 12px;
    color: #666;
    max-width: 150px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
}

.btn-delete-doc-table {
    width: 20px;
    height: 20px;
    border: 1px solid #f44336;
    background-color: white;
    color: #f44336;
    border-radius: 3px;
    cursor: pointer;
    font-size: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn-delete-doc-table:hover { background-color: #f44336; color: white; }

.doc-type-select {
    padding: 5px 8px;
    border: 2px solid #2196F3;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
    outline: none;
    cursor: pointer;
    background-color: #E3F2FD;
    color: #1565C0;
    min-width: 80px;
}

.doc-type-select:hover { background-color: #BBDEFB; border-color: #1976D2; }
.doc-type-select:focus { border-color: #1565C0; box-shadow: 0 0 6px rgba(33, 150, 243, 0.4); }
.doc-type-select.type-status { border-color: #FF9800; background-color: #FFF3E0; color: #E65100; }
.doc-type-select.type-go { border-color: #4CAF50; background-color: #E8F5E9; color: #2E7D32; }

.bottom-section { display: flex; gap: 30px; margin-bottom: 20px; }

.decision-section, .holding-section {
    flex: 1;
    padding: 15px;
    background-color: #fafafa;
    border: 1px solid #ddd;
    border-radius: 6px;
}

.decision-section.disabled { background-color: #f5f5f5; border-color: #e0e0e0; opacity: 0.7; }
.decision-section.disabled label { color: #999; }
.decision-section.disabled .decision-input { background-color: #f0f0f0; border-color: #ccc; color: #999; cursor: not-allowed; }

.decision-section .disabled-message {
    display: none;
    font-size: 11px;
    color: #FF9800;
    margin-top: 8px;
    padding: 6px 10px;
    background-color: #FFF3E0;
    border: 1px solid #FFE082;
    border-radius: 4px;
}

.decision-section.disabled .disabled-message { display: block; }

.decision-section label, .holding-section label {
    display: block;
    font-size: 14px;
    font-weight: 600;
    color: #333;
    margin-bottom: 10px;
}

.decision-row, .holding-row { display: flex; align-items: center; gap: 10px; }
.decision-row span, .holding-row span { font-size: 13px; color: #666; }

.decision-input {
    padding: 6px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
}

.decision-input:focus { border-color: #8BC34A; }
.decision-input:disabled { background-color: #f0f0f0; border-color: #ccc; color: #999; cursor: not-allowed; }

.holding-select {
    padding: 6px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
    min-width: 120px;
}

.holding-select:focus { border-color: #8BC34A; }

.holding-input {
    flex: 1;
    padding: 6px 10px;
    border: 1px solid #ddd;
    border-radius: 4px;
    font-size: 13px;
    outline: none;
}

.holding-input:focus { border-color: #8BC34A; }

.save-section { display: flex; justify-content: flex-end; gap: 10px; }

.btn-save {
    padding: 10px 40px;
    background-color: #8BC34A;
    color: white;
    border: none;
    border-radius: 6px;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
}

.btn-save:hover { background-color: #7CB342; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(139, 195, 74, 0.4); }

/* MODAL CSS */
.modal-overlay {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background-color: rgba(0, 0, 0, 0.5);
    display: flex;
    justify-content: center;
    align-items: center;
    z-index: 1000;
}

.modal-content {
    background-color: white;
    border-radius: 12px;
    width: 90%;
    max-width: 800px;
    max-height: 85vh;
    overflow: hidden;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.2);
}

.modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 20px 25px;
    background-color: #8BC34A;
    color: white;
}

.modal-header h3 { font-size: 18px; font-weight: 600; }

.signature-label {
    font-size: 12px;
    padding: 4px 10px;
    background-color: rgba(255, 255, 255, 0.2);
    border-radius: 15px;
    margin-left: auto;
    margin-right: 15px;
}

.btn-close-modal {
    width: 32px; height: 32px;
    border: none;
    background-color: rgba(255, 255, 255, 0.2);
    color: white;
    border-radius: 50%;
    cursor: pointer;
    font-size: 20px;
    display: flex;
    align-items: center;
    justify-content: center;
}

.btn-close-modal:hover { background-color: rgba(255, 255, 255, 0.3); }

.modal-body {
    padding: 20px 25px;
    max-height: calc(85vh - 80px);
    overflow-y: auto;
}

.modal-section {
    margin-bottom: 25px;
    padding-bottom: 20px;
    border-bottom: 1px solid #e0e0e0;
}

.modal-section:last-child { margin-bottom: 0; padding-bottom: 0; border-bottom: none; }

.modal-section-title {
    font-size: 14px;
    font-weight: 700;
    color: #333;
    margin-bottom: 12px;
    display: flex;
    align-items: center;
    gap: 8px;
}

.released-file-item {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 15px;
    background-color: #e3f2fd;
    border: 1px solid #90CAF9;
    border-left: 4px solid #2196F3;
    border-radius: 6px;
    margin-bottom: 8px;
}

.released-file-item .file-icon { font-size: 20px; }
.released-file-item .file-details { flex: 1; }
.released-file-item .file-title { font-size: 14px; font-weight: 600; color: #1565C0; margin-bottom: 2px; }
.released-file-item .file-meta { font-size: 11px; color: #666; display: flex; gap: 10px; }

.released-file-item .btn-download {
    padding: 6px 12px;
    background: linear-gradient(135deg, #2196F3 0%, #1976D2 100%);
    color: white;
    border: none;
    border-radius: 4px;
    cursor: pointer;
    font-size: 12px;
}

.released-file-item .btn-download:hover { background: linear-gradient(135deg, #1976D2 0%, #1565C0 100%); }

/* HISTORY CSS */
.history-container { padding: 20px; width: 100%; }

.history-table {
    margin-top: 20px;
    overflow-x: auto;
    background: white;
    border-radius: 8px;
    box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
}

#history-records { width: 100%; border-collapse: collapse; min-width: 1800px; }

#history-records thead {
    background-color: #8BC34A;
    color: white;
    position: sticky;
    top: 0;
    z-index: 10;
}

#history-records th {
    padding: 12px 10px;
    text-align: left;
    font-weight: 600;
    font-size: 13px;
    border: 1px solid #7CB342;
    white-space: nowrap;
}

#history-records th.manager-col { background-color: #7B1FA2; border-color: #6A1B9A; }
#history-records th.doc-type-col { background-color: #2196F3; border-color: #1976D2; }
#history-records td.manager-cell { background-color: #faf5fc; color: #7B1FA2; font-weight: 600; }
#history-records td.doc-type-cell { font-weight: 600; text-align: center; }
#history-records td.doc-type-cell.type-status { background-color: #FFF3E0; color: #E65100; }
#history-records td.doc-type-cell.type-go { background-color: #E8F5E9; color: #2E7D32; }

.doc-type-badge {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 12px;
    font-size: 11px;
    font-weight: 700;
}

.doc-type-badge.status { background-color: #FF9800; color: white; }
.doc-type-badge.go { background-color: #4CAF50; color: white; }

#history-records tbody tr:not(.empty-row):hover { background-color: #f5f5f5; }
#history-records tbody tr:nth-child(even):not(.empty-row) { background-color: #fafafa; }

#history-records td {
    padding: 10px;
    border: 1px solid #e0e0e0;
    font-size: 13px;
    color: #333;
}

#history-records td:first-child { text-align: center; font-weight: 600; color: #8BC34A; }

<script>
const projectData = {
    '2022': { projects: [{ name: 'ACTIVIA', subProjects: [], products: { '_direct': [] } }] },
    '2023': { projects: [{ name: '풀무원 요거트', subProjects: ['하루', '솔루션', '요거톡'], products: {} }] },
    '2024': { projects: [{ name: '풀무원 요거트', subProjects: ['하루', '솔루션', '요거톡'], products: {} }] },
    '2025': { projects: [{ name: '풀무원 요거트', subProjects: ['하루', '솔루션', '요거톡'], products: {} }] }
};

const releasedProductFiles = {};
let currentSelectedBrand = null, currentSelectedYear = null, currentSelectedSubProject = null;
const historyRecords = [];
let editingRecordId = null;

document.addEventListener('DOMContentLoaded', function() {
    initTabs();
    initYearList();
    initAddBrandButton();
    initAddYearButton();
    initOngoingTableUpload();
    initSaveButton();
    initExportButton();
    initDeleteAllButton();
    initTBDToggle();
    initDocTypeSelectChange();
    initEditButtons();
    checkDecisionSectionStatus();
});

function checkDecisionSectionStatus() {
    const rows = document.querySelectorAll('#report-table-body tr');
    let hasGo = false;
    rows.forEach(row => {
        const sel = row.querySelector('.doc-type-select');
        if (sel && sel.value === 'Go') hasGo = true;
    });
    const section = document.getElementById('decision-section');
    const dateInput = document.getElementById('decision-date');
    const uploadBtn = document.getElementById('decision-upload-btn');
    if (hasGo) {
        section.classList.remove('disabled');
        dateInput.disabled = false;
        uploadBtn.disabled = false;
    } else {
        section.classList.add('disabled');
        dateInput.disabled = true;
        uploadBtn.disabled = true;
    }
}

function initDocTypeSelectChange() {
    document.addEventListener('change', function(e) {
        if (e.target.classList.contains('doc-type-select')) {
            updateDocTypeSelectStyle(e.target);
            checkDecisionSectionStatus();
        }
    });
}

function updateDocTypeSelectStyle(sel) {
    sel.classList.remove('type-status', 'type-go');
    if (sel.value === 'Status') sel.classList.add('type-status');
    else if (sel.value === 'Go') sel.classList.add('type-go');
}

function initTBDToggle() {
    const cb = document.getElementById('ongoing-tbd');
    if (cb) cb.addEventListener('change', function() { toggleYearInput(this.checked); });
}

function toggleYearInput(checked) {
    const inp = document.getElementById('ongoing-year');
    const grp = document.getElementById('year-group');
    const cont = document.getElementById('tbd-container');
    if (checked) {
        inp.disabled = true; inp.value = '';
        grp.classList.add('disabled'); cont.classList.add('active');
    } else {
        inp.disabled = false;
        grp.classList.remove('disabled'); cont.classList.remove('active');
    }
}

function initTabs() {
    const tabs = document.querySelectorAll('.tab');
    const contents = document.querySelectorAll('.tab-content');
    const title = document.getElementById('page-title');
    tabs.forEach(tab => {
        tab.addEventListener('click', function() {
            tabs.forEach(t => t.classList.remove('active'));
            contents.forEach(c => c.classList.remove('active'));
            this.classList.add('active');
            const name = this.getAttribute('data-tab');
            document.getElementById(name + '-content').classList.add('active');
            if (name === 'archive') title.textContent = 'I. CODEV ARCHIVE';
            else if (name === 'ongoing') title.textContent = 'II. Ongoing Projects';
            else if (name === 'history') title.textContent = 'III. History';
        });
    });
}

function initYearList() {
    document.querySelectorAll('.year-item').forEach(item => {
        item.addEventListener('click', function() {
            document.querySelectorAll('.year-item').forEach(y => y.classList.remove('active'));
            this.classList.add('active');
            loadProjectsForYear(this.getAttribute('data-year'));
        });
    });
    const def = document.querySelector('.year-item.active');
    if (def) loadProjectsForYear(def.getAttribute('data-year'));
}

function initAddYearButton() {
    document.getElementById('btn-add-year')?.addEventListener('click', function() {
        const yr = prompt('새 연도 입력 (예: 2026):');
        if (yr && /^\d{4}$/.test(yr.trim())) {
            if (projectData[yr.trim()]) { alert('이미 존재합니다.'); return; }
            projectData[yr.trim()] = { projects: [] };
            addYearToList(yr.trim());
        }
    });
}

function addYearToList(year) {
    const list = document.querySelector('.year-list');
    if (list.querySelector(`[data-year="${year}"]`)) return;
    const item = document.createElement('div');
    item.className = 'year-item';
    item.setAttribute('data-year', year);
    item.innerHTML = `<span class="year-number">${year}</span>`;
    item.addEventListener('click', function() {
        document.querySelectorAll('.year-item').forEach(y => y.classList.remove('active'));
        this.classList.add('active');
        loadProjectsForYear(year);
    });
    list.appendChild(item);
}

function initAddBrandButton() {
    document.getElementById('btn-add-brand')?.addEventListener('click', function() {
        const name = prompt('새 브랜드 이름:');
        if (name && name.trim()) {
            const active = document.querySelector('.year-item.active');
            if (!active) { alert('연도를 선택하세요.'); return; }
            const year = active.getAttribute('data-year');
            if (!projectData[year]) projectData[year] = { projects: [] };
            projectData[year].projects.push({ name: name.trim(), subProjects: [], products: { '_direct': [] } });
            loadProjectsForYear(year);
        }
    });
}

function loadProjectsForYear(year) {
    currentSelectedYear = year;
    const tree = document.getElementById('project-tree');
    tree.innerHTML = '';
    const data = projectData[year];
    if (data) data.projects.forEach(p => tree.appendChild(createProjectItem(p)));
    document.getElementById('product-detail').innerHTML = '<p class="empty-message">브랜드를 선택하세요</p>';
}

function createProjectItem(project) {
    const div = document.createElement('div');
    div.className = 'project-item-main';
    const header = document.createElement('div');
    header.className = 'project-main-header';
    
    if (project.subProjects?.length > 0) {
        header.innerHTML = `<span class="toggle-icon">▶</span><span class="project-main-name">${project.name}</span><button class="btn-edit-brand">✏️</button><button class="btn-add-subfolder">+</button>`;
        const content = document.createElement('div');
        content.className = 'project-main-content';
        project.subProjects.forEach(sub => {
            const subItem = document.createElement('div');
            subItem.className = 'sub-project-item';
            subItem.innerHTML = `<span class="sub-project-name">${sub}</span><button class="btn-edit-subfolder">✏️</button><button class="btn-add-product-sub">+</button>`;
            subItem.querySelector('.sub-project-name').addEventListener('click', e => { e.stopPropagation(); selectSubProject(sub, subItem, project.name); });
            subItem.querySelector('.btn-add-product-sub').addEventListener('click', e => { e.stopPropagation(); addProductToSubProject(project.name, sub); });
            content.appendChild(subItem);
        });
        header.addEventListener('click', function(e) {
            if (e.target.closest('.btn-add-subfolder') || e.target.closest('.btn-edit-brand')) return;
            const icon = header.querySelector('.toggle-icon');
            if (content.classList.contains('expanded')) {
                content.classList.remove('expanded'); icon.textContent = '▶'; header.classList.remove('active');
            } else {
                content.classList.add('expanded'); icon.textContent = '▼'; header.classList.add('active');
                currentSelectedBrand = project.name; currentSelectedSubProject = '_direct';
                loadProductsForBrand(project.name);
            }
        });
        div.appendChild(header);
        div.appendChild(content);
    } else {
        header.innerHTML = `<span class="project-main-name">${project.name}</span><button class="btn-edit-brand">✏️</button><button class="btn-add-subfolder">+</button>`;
        header.addEventListener('click', function(e) {
            if (e.target.closest('.btn-add-subfolder') || e.target.closest('.btn-edit-brand')) return;
            document.querySelectorAll('.project-main-header').forEach(h => h.classList.remove('active'));
            header.classList.add('active');
            currentSelectedBrand = project.name; currentSelectedSubProject = '_direct';
            loadProductsForBrand(project.name);
        });
        div.appendChild(header);
    }
    
    header.querySelector('.btn-add-subfolder')?.addEventListener('click', e => { e.stopPropagation(); addSubfolder(project); });
    return div;
}

function selectSubProject(subName, element, brandName) {
    document.querySelectorAll('.project-main-header, .sub-project-item').forEach(el => el.classList.remove('active'));
    element.classList.add('active');
    currentSelectedBrand = brandName; currentSelectedSubProject = subName;
    loadProductsForSubProject(brandName, subName);
}

function addSubfolder(project) {
    const name = prompt(`"${project.name}"에 추가할 하위 폴더:`);
    if (name && name.trim()) {
        const year = document.querySelector('.year-item.active')?.getAttribute('data-year');
        const p = projectData[year]?.projects.find(pr => pr.name === project.name);
        if (p) {
            if (!p.subProjects) p.subProjects = [];
            p.subProjects.push(name.trim());
            if (!p.products) p.products = { '_direct': [] };
            p.products[name.trim()] = [];
            loadProjectsForYear(year);
        }
    }
}

function addProductToSubProject(brandName, subName) {
    const name = prompt(`"${subName}"에 추가할 제품명:`);
    if (name && name.trim()) {
        const year = currentSelectedYear;
        const brand = projectData[year]?.projects.find(p => p.name === brandName);
        if (brand) {
            if (!brand.products) brand.products = { '_direct': [] };
            if (!brand.products[subName]) brand.products[subName] = [];
            brand.products[subName].push(name.trim());
            loadProductsForSubProject(brandName, subName);
        }
    }
}

function loadProductsForBrand(brandName) {
    const detail = document.getElementById('product-detail');
    detail.innerHTML = '';
    const brand = projectData[currentSelectedYear]?.projects.find(p => p.name === brandName);
    if (!brand?.products?.['_direct']?.length) {
        detail.innerHTML = '<p class="empty-message">출시된 제품이 없습니다.</p>'; return;
    }
    brand.products['_direct'].forEach((prod, i) => {
        const item = document.createElement('div');
        item.className = 'product-list-item';
        item.innerHTML = `<span class="product-icon">📦</span><span class="product-name-text">${prod}</span><button class="btn-delete-product">×</button>`;
        item.addEventListener('click', e => { if (!e.target.closest('.btn-delete-product')) showReleasedProductModal(prod); });
        item.querySelector('.btn-delete-product').addEventListener('click', e => {
            e.stopPropagation();
            if (confirm(`"${prod}" 삭제?`)) { brand.products['_direct'].splice(i, 1); loadProductsForBrand(brandName); }
        });
        detail.appendChild(item);
    });
}

function loadProductsForSubProject(brandName, subName) {
    const detail = document.getElementById('product-detail');
    detail.innerHTML = '';
    const brand = projectData[currentSelectedYear]?.projects.find(p => p.name === brandName);
    if (!brand?.products?.[subName]?.length) {
        detail.innerHTML = '<p class="empty-message">제품을 추가하세요.</p>'; return;
    }
    brand.products[subName].forEach((prod, i) => {
        const item = document.createElement('div');
        item.className = 'product-list-item';
        item.innerHTML = `<span class="product-icon">📦</span><span class="product-name-text">${prod}</span><button class="btn-delete-product">×</button>`;
        item.addEventListener('click', e => { if (!e.target.closest('.btn-delete-product')) showReleasedProductModal(prod); });
        item.querySelector('.btn-delete-product').addEventListener('click', e => {
            e.stopPropagation();
            if (confirm(`"${prod}" 삭제?`)) { brand.products[subName].splice(i, 1); loadProductsForSubProject(brandName, subName); }
        });
        detail.appendChild(item);
    });
}

function showReleasedProductModal(productName) {
    document.getElementById('released-product-modal')?.remove();
    const files = releasedProductFiles[productName];
    const modal = document.createElement('div');
    modal.id = 'released-product-modal';
    modal.className = 'modal-overlay';
    modal.innerHTML = `
        <div class="modal-content">
            <div class="modal-header"><h3>📦 ${productName}</h3><div class="signature-label">출시된 제품 문서</div><button class="btn-close-modal">×</button></div>
            <div class="modal-body">${files ? buildModalContent(files) : '<p class="empty-message">등록된 파일이 없습니다.</p>'}</div>
        </div>`;
    modal.querySelector('.btn-close-modal').addEventListener('click', () => modal.remove());
    modal.addEventListener('click', e => { if (e.target === modal) modal.remove(); });
    document.body.appendChild(modal);
}

function buildModalContent(files) {
    let html = '';
    if (files.projectInfo) {
        html += `<div class="modal-section"><div class="modal-section-title">📋 프로젝트 정보</div>
            <div style="background:#f5f5f5;padding:15px;border-radius:8px;font-size:13px;line-height:1.8;">
            <div><strong>브랜드:</strong> ${files.projectInfo.brand || '-'}</div>
            <div><strong>담당자:</strong> 👤 ${files.projectInfo.manager || '-'}</div>
            <div><strong>Gate:</strong> ${files.projectInfo.gate || '-'}</div></div></div>`;
    }
    if (files.reports?.length) {
        html += `<div class="modal-section"><div class="modal-section-title">📄 보고서</div>`;
        files.reports.forEach(r => {
            if (r.document) {
                const badge = r.docType ? `<span class="doc-type-badge ${r.docType.toLowerCase()}">${r.docType}</span>` : '';
                html += `<div class="released-file-item"><span class="file-icon">📎</span>
                    <div class="file-details"><div class="file-title">${r.document} ${badge}</div>
                    <div class="file-meta"><span>📅 ${r.reportDate || '-'}</span></div></div>
                    <button class="btn-download">⬇️ 다운로드</button></div>`;
            }
        });
        html += '</div>';
    }
    return html || '<p class="empty-message">등록된 파일이 없습니다.</p>';
}

function initOngoingTableUpload() {
    document.getElementById('ongoing-content')?.addEventListener('click', function(e) {
        if (e.target.classList.contains('btn-upload-doc-table') && !e.target.disabled) handleTableDocUpload(e.target.closest('.doc-upload-cell'));
        if (e.target.classList.contains('btn-delete-doc-table')) handleTableDocDelete(e.target.closest('.doc-upload-cell'));
    });
}

function handleTableDocUpload(cell) {
    const input = document.createElement('input');
    input.type = 'file';
    input.accept = '.pdf,.doc,.docx,.xlsx,.ppt,.pptx';
    input.addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            cell.dataset.fileName = file.name;
            cell._fileObject = file;
            cell.querySelector('.doc-file-name').textContent = file.name;
            const btn = cell.querySelector('.btn-upload-doc-table');
            btn.textContent = '재선택'; btn.classList.add('uploaded');
            cell.querySelector('.btn-delete-doc-table').style.display = 'flex';
        }
    });
    input.click();
}

function handleTableDocDelete(cell) {
    if (confirm('파일을 삭제하시겠습니까?')) {
        delete cell.dataset.fileName; delete cell._fileObject;
        cell.querySelector('.doc-file-name').textContent = '';
        const btn = cell.querySelector('.btn-upload-doc-table');
        btn.textContent = '파일 선택'; btn.classList.remove('uploaded');
        cell.querySelector('.btn-delete-doc-table').style.display = 'none';
    }
}

function initSaveButton() {
    document.getElementById('btn-save')?.addEventListener('click', saveOngoingProject);
}

function saveOngoingProject() {
    const brand = document.getElementById('ongoing-brand').value;
    const product = document.getElementById('ongoing-product').value;
    const project = document.getElementById('ongoing-project').value;
    const gate = document.getElementById('ongoing-gate').value;
    const year = document.getElementById('ongoing-year').value;
    const tbd = document.getElementById('ongoing-tbd').checked;
    const manager = document.getElementById('ongoing-manager').value;

    if (!brand || !product || !project || !gate || (!year && !tbd)) {
        alert('필수 항목을 입력하세요.'); return;
    }

    const reports = [];
    document.querySelectorAll('#report-table-body tr').forEach(row => {
        const date = row.querySelector('input[type="date"]')?.value || '';
        const cell = row.querySelector('.doc-upload-cell');
        const doc = cell?.dataset.fileName || '';
        const type = row.querySelector('.doc-type-select')?.value || '';
        const note = row.querySelector('.table-input[placeholder="회의록 입력"]')?.value || '';
        if (date || doc || type || note) reports.push({ reportDate: date, document: doc, docType: type, meetingNote: note, file: cell?._fileObject });
    });

    const signDate = document.getElementById('decision-date').value;
    const decCell = document.getElementById('decision-upload-cell');
    const decDoc = decCell?.dataset.fileName || '';
    const holdStatus = document.querySelector('.holding-select').value;
    const holdReason = document.querySelector('.holding-input').value;

    historyRecords.push({
        id: historyRecords.length + 1, brand, product, project, gate, year, tbd, manager,
        reports, signatureDate: signDate, decisionDocument: decDoc, holdingStatus: holdStatus, holdingReason: holdReason, released: false
    });

    updateHistoryTable();
    alert('저장되었습니다!');
    if (confirm('초기화하시겠습니까?')) clearOngoingForm();
}

function updateHistoryTable() {
    const tbody = document.getElementById('history-tbody');
    tbody.innerHTML = '';
    if (!historyRecords.length) {
        tbody.innerHTML = '<tr class="empty-row"><td colspan="18" style="text-align:center;padding:40px;color:#999;">저장된 기록이 없습니다</td></tr>';
        return;
    }
    historyRecords.forEach(rec => {
        const tbdDisp = rec.tbd ? '✅ TBD' : '-';
        const yearDisp = rec.tbd ? '<span style="color:#FF9800;font-weight:bold;">TBD</span>' : (rec.year || '-');
        const releaseBtn = rec.gate === 'Closure' ? (rec.released ? '<button class="btn-release released" disabled>✓ 출시완료</button>' : `<button class="btn-release" onclick="releaseProject(${rec.id})">🚀 출시</button>`) : '-';

        if (rec.reports.length) {
            rec.reports.forEach((rpt, i) => {
                const badge = rpt.docType ? `<span class="doc-type-badge ${rpt.docType.toLowerCase()}">${rpt.docType}</span>` : '-';
                const cellClass = rpt.docType ? `doc-type-cell type-${rpt.docType.toLowerCase()}` : '';
                const row = document.createElement('tr');
                if (i === 0) {
                    row.innerHTML = `<td rowspan="${rec.reports.length}">${rec.id}</td><td rowspan="${rec.reports.length}">${rec.brand}</td><td rowspan="${rec.reports.length}">${rec.product}</td><td rowspan="${rec.reports.length}">${rec.project}</td><td rowspan="${rec.reports.length}" class="manager-cell">👤 ${rec.manager||'-'}</td><td rowspan="${rec.reports.length}">${rec.gate}</td><td rowspan="${rec.reports.length}">${yearDisp}</td><td rowspan="${rec.reports.length}">${tbdDisp}</td><td>${rpt.reportDate||'-'}</td><td>${rpt.document?`<span class="doc-link">📄 ${rpt.document}</span>`:'-'}</td><td class="${cellClass}">${badge}</td><td>${rpt.meetingNote||'-'}</td><td rowspan="${rec.reports.length}">${rec.signatureDate||'-'}</td><td rowspan="${rec.reports.length}">${rec.holdingStatus||'-'}</td><td rowspan="${rec.reports.length}">${rec.holdingReason||'-'}</td><td rowspan="${rec.reports.length}">${releaseBtn}</td><td rowspan="${rec.reports.length}"><button class="btn-edit-history" onclick="editHistoryRecord(${rec.id})">✏️ 수정</button></td><td rowspan="${rec.reports.length}"><button class="btn-delete-history" onclick="deleteHistoryRecord(${rec.id})">🗑️ 삭제</button></td>`;
                } else {
                    row.innerHTML = `<td>${rpt.reportDate||'-'}</td><td>${rpt.document?`<span class="doc-link">📄 ${rpt.document}</span>`:'-'}</td><td class="${cellClass}">${badge}</td><td>${rpt.meetingNote||'-'}</td>`;
                }
                tbody.appendChild(row);
            });
        } else {
            const row = document.createElement('tr');
            row.innerHTML = `<td>${rec.id}</td><td>${rec.brand}</td><td>${rec.product}</td><td>${rec.project}</td><td class="manager-cell">👤 ${rec.manager||'-'}</td><td>${rec.gate}</td><td>${yearDisp}</td><td>${tbdDisp}</td><td>-</td><td>-</td><td>-</td><td>-</td><td>${rec.signatureDate||'-'}</td><td>${rec.holdingStatus||'-'}</td><td>${rec.holdingReason||'-'}</td><td>${releaseBtn}</td><td><button class="btn-edit-history" onclick="editHistoryRecord(${rec.id})">✏️ 수정</button></td><td><button class="btn-delete-history" onclick="deleteHistoryRecord(${rec.id})">🗑️ 삭제</button></td>`;
            tbody.appendChild(row);
        }
    });
}

function releaseProject(id) {
    const rec = historyRecords.find(r => r.id === id);
    if (!rec || rec.gate !== 'Closure' || rec.tbd || !rec.year) { alert('출시 조건을 확인하세요.'); return; }
    if (confirm(`"${rec.product}"를 ARCHIVE에 출시?`)) {
        const yr = new Date(rec.year).getFullYear().toString();
        if (!projectData[yr]) { projectData[yr] = { projects: [] }; addYearToList(yr); }
        let brand = projectData[yr].projects.find(p => p.name === rec.brand);
        if (!brand) { brand = { name: rec.brand, subProjects: [], products: { '_direct': [] } }; projectData[yr].projects.push(brand); }
        if (!brand.products) brand.products = { '_direct': [] };
        if (!brand.products['_direct'].includes(rec.product)) brand.products['_direct'].push(rec.product);
        releasedProductFiles[rec.product] = { projectInfo: { brand: rec.brand, manager: rec.manager, gate: rec.gate }, reports: rec.reports };
        rec.released = true;
        updateHistoryTable();
        alert(`✅ "${rec.product}" 출시 완료!`);
    }
}

function deleteHistoryRecord(id) {
    if (confirm('삭제하시겠습니까?')) {
        const i = historyRecords.findIndex(r => r.id === id);
        if (i !== -1) { historyRecords.splice(i, 1); historyRecords.forEach((r, idx) => r.id = idx + 1); updateHistoryTable(); }
    }
}

function initDeleteAllButton() {
    document.getElementById('btn-delete-all')?.addEventListener('click', function() {
        if (!historyRecords.length) { alert('삭제할 기록이 없습니다.'); return; }
        if (confirm('전체 삭제하시겠습니까?')) { historyRecords.length = 0; updateHistoryTable(); }
    });
}

function clearOngoingForm() {
    document.getElementById('ongoing-brand').value = '';
    document.getElementById('ongoing-product').value = '';
    document.getElementById('ongoing-project').value = '';
    document.getElementById('ongoing-gate').value = '';
    document.getElementById('ongoing-year').value = '';
    document.getElementById('ongoing-tbd').checked = false;
    document.getElementById('ongoing-manager').value = '';
    toggleYearInput(false);

    document.getElementById('report-table-body').innerHTML = `<tr><td><input type="date" class="table-input"></td><td><div class="doc-upload-cell"><button class="btn-upload-doc-table">파일 선택</button><span class="doc-file-name"></span><button class="btn-delete-doc-table" style="display:none;">×</button></div></td><td><select class="doc-type-select"><option value="">선택</option><option value="Status">Status</option><option value="Go">Go</option></select></td><td><input type="text" class="table-input" placeholder="회의록 입력"></td><td><button class="btn-delete-row" onclick="deleteReportRow(this)">−</button></td></tr>`;

    document.getElementById('decision-date').value = '';
    const decCell = document.getElementById('decision-upload-cell');
    if (decCell) {
        delete decCell.dataset.fileName; delete decCell._fileObject;
        decCell.querySelector('.doc-file-name').textContent = '';
        const btn = decCell.querySelector('.btn-upload-doc-table');
        btn.textContent = '파일 선택'; btn.classList.remove('uploaded');
        decCell.querySelector('.btn-delete-doc-table').style.display = 'none';
    }
    document.querySelector('.holding-select').value = '';
    document.querySelector('.holding-input').value = '';
    checkDecisionSectionStatus();
}

function initExportButton() {
    document.getElementById('btn-export-excel')?.addEventListener('click', function() {
        if (!historyRecords.length) { alert('기록이 없습니다.'); return; }
        let csv = '\uFEFF번호,브랜드,제품명,프로젝트명,담당자,Gate,출시년도,TBD,보고날짜,문서,문서타입,회의록,서명날짜,홀딩상태,홀딩사유\n';
        historyRecords.forEach(r => {
            const yr = r.tbd ? 'TBD' : (r.year || '-');
            if (r.reports.length) {
                r.reports.forEach((rpt, i) => {
                    if (i === 0) csv += `${r.id},"${r.brand}","${r.product}","${r.project}","${r.manager||''}","${r.gate}","${yr}","${r.tbd?'Y':''}","${rpt.reportDate||'-'}","${rpt.document||'-'}","${rpt.docType||'-'}","${rpt.meetingNote||'-'}","${r.signatureDate||'-'}","${r.holdingStatus||'-'}","${r.holdingReason||'-'}"\n`;
                    else csv += `,,,,,,,,,"${rpt.reportDate||'-'}","${rpt.document||'-'}","${rpt.docType||'-'}","${rpt.meetingNote||'-'}",,\n`;
                });
            } else {
                csv += `${r.id},"${r.brand}","${r.product}","${r.project}","${r.manager||''}","${r.gate}","${yr}","${r.tbd?'Y':''}","-","-","-","-","${r.signatureDate||'-'}","${r.holdingStatus||'-'}","${r.holdingReason||'-'}"\n`;
            }
        });
        const link = document.createElement('a');
        link.href = URL.createObjectURL(new Blob([csv], { type: 'text/csv;charset=utf-8;' }));
        link.download = `CODEV_History_${new Date().toISOString().slice(0,10)}.csv`;
        link.click();
    });
}

function addReportRow() {
    const tbody = document.getElementById('report-table-body');
    const row = document.createElement('tr');
    row.innerHTML = `<td><input type="date" class="table-input"></td><td><div class="doc-upload-cell"><button class="btn-upload-doc-table">파일 선택</button><span class="doc-file-name"></span><button class="btn-delete-doc-table" style="display:none;">×</button></div></td><td><select class="doc-type-select"><option value="">선택</option><option value="Status">Status</option><option value="Go">Go</option></select></td><td><input type="text" class="table-input" placeholder="회의록 입력"></td><td><button class="btn-delete-row" onclick="deleteReportRow(this)">−</button></td>`;
    tbody.appendChild(row);
    row.style.backgroundColor = '#e8f5e9';
    setTimeout(() => { row.style.transition = 'background-color 0.5s'; row.style.backgroundColor = ''; }, 100);
}

function deleteReportRow(btn) {
    const tbody = document.getElementById('report-table-body');
    if (tbody.querySelectorAll('tr').length <= 1) { alert('최소 1행 필요'); return; }
    if (confirm('삭제하시겠습니까?')) {
        const row = btn.closest('tr');
        row.style.opacity = '0';
        setTimeout(() => { row.remove(); checkDecisionSectionStatus(); }, 300);
    }
}

function initEditButtons() {
    document.getElementById('btn-update')?.addEventListener('click', updateHistoryRecord);
    document.getElementById('btn-cancel-edit')?.addEventListener('click', cancelEdit);
}

function editHistoryRecord(id) {
    const rec = historyRecords.find(r => r.id === id);
    if (!rec) return;

    document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
    document.querySelector('[data-tab="ongoing"]').classList.add('active');
    document.getElementById('ongoing-content').classList.add('active');
    document.getElementById('page-title').textContent = 'II. Ongoing Projects';

    document.getElementById('ongoing-brand').value = rec.brand || '';
    document.getElementById('ongoing-product').value = rec.product || '';
    document.getElementById('ongoing-project').value = rec.project || '';
    document.getElementById('ongoing-gate').value = rec.gate || '';
    document.getElementById('ongoing-year').value = rec.year || '';
    document.getElementById('ongoing-tbd').checked = rec.tbd || false;
    document.getElementById('ongoing-manager').value = rec.manager || '';
    toggleYearInput(rec.tbd);

    const tbody = document.getElementById('report-table-body');
    tbody.innerHTML = '';
    if (rec.reports?.length) {
        rec.reports.forEach(rpt => {
            const row = document.createElement('tr');
            row.innerHTML = `<td><input type="date" class="table-input" value="${rpt.reportDate||''}"></td><td><div class="doc-upload-cell" data-file-name="${rpt.document||''}"><button class="btn-upload-doc-table ${rpt.document?'uploaded':''}">${rpt.document?'재선택':'파일 선택'}</button><span class="doc-file-name">${rpt.document||''}</span><button class="btn-delete-doc-table" style="display:${rpt.document?'flex':'none'};">×</button></div></td><td><select class="doc-type-select"><option value="">선택</option><option value="Status" ${rpt.docType==='Status'?'selected':''}>Status</option><option value="Go" ${rpt.docType==='Go'?'selected':''}>Go</option></select></td><td><input type="text" class="table-input" placeholder="회의록 입력" value="${rpt.meetingNote||''}"></td><td><button class="btn-delete-row" onclick="deleteReportRow(this)">−</button></td>`;
            const sel = row.querySelector('.doc-type-select');
            if (sel) updateDocTypeSelectStyle(sel);
            tbody.appendChild(row);
        });
    } else addReportRow();

    checkDecisionSectionStatus();
    document.getElementById('decision-date').value = rec.signatureDate || '';
    const decCell = document.getElementById('decision-upload-cell');
    if (decCell && rec.decisionDocument) {
        decCell.dataset.fileName = rec.decisionDocument;
        decCell.querySelector('.doc-file-name').textContent = rec.decisionDocument;
        const btn = decCell.querySelector('.btn-upload-doc-table');
        btn.textContent = '재선택'; btn.classList.add('uploaded');
        decCell.querySelector('.btn-delete-doc-table').style.display = 'flex';
    }
    document.querySelector('.holding-select').value = rec.holdingStatus || '';
    document.querySelector('.holding-input').value = rec.holdingReason || '';

    editingRecordId = id;
    setEditMode(true);
    showEditModeIndicator(rec);
    window.scrollTo({ top: 0, behavior: 'smooth' });
}

function setEditMode(on) {
    document.getElementById('btn-save').style.display = on ? 'none' : 'inline-block';
    document.getElementById('btn-update').style.display = on ? 'inline-block' : 'none';
    document.getElementById('btn-cancel-edit').style.display = on ? 'inline-block' : 'none';
    if (!on) { editingRecordId = null; removeEditModeIndicator(); }
}

function showEditModeIndicator(rec) {
    removeEditModeIndicator();
    const div = document.createElement('div');
    div.className = 'edit-mode-indicator'; div.id = 'edit-mode-indicator';
    div.innerHTML = `<span class="icon">✏️</span><span class="text">수정 모드: [${rec.brand}] ${rec.project} (번호: ${rec.id})</span>`;
    document.querySelector('.ongoing-container .panel-title').insertAdjacentElement('afterend', div);
}

function removeEditModeIndicator() {
    document.getElementById('edit-mode-indicator')?.remove();
}

function updateHistoryRecord() {
    if (!editingRecordId) return;
    const idx = historyRecords.findIndex(r => r.id === editingRecordId);
    if (idx === -1) return;

    const reports = [];
    document.querySelectorAll('#report-table-body tr').forEach(row => {
        const date = row.querySelector('input[type="date"]')?.value || '';
        const cell = row.querySelector('.doc-upload-cell');
        const doc = cell?.dataset.fileName || cell?.querySelector('.doc-file-name')?.textContent || '';
        const type = row.querySelector('.doc-type-select')?.value || '';
        const note = row.querySelector('.table-input[placeholder="회의록 입력"]')?.value || '';
        reports.push({ reportDate: date, document: doc, docType: type, meetingNote: note, file: cell?._fileObject });
    });

    historyRecords[idx] = {
        ...historyRecords[idx],
        brand: document.getElementById('ongoing-brand').value,
        product: document.getElementById('ongoing-product').value,
        project: document.getElementById('ongoing-project').value,
        gate: document.getElementById('ongoing-gate').value,
        year: document.getElementById('ongoing-year').value,
        tbd: document.getElementById('ongoing-tbd').checked,
        manager: document.getElementById('ongoing-manager').value,
        reports,
        signatureDate: document.getElementById('decision-date').value,
        decisionDocument: document.getElementById('decision-upload-cell')?.dataset.fileName || '',
        holdingStatus: document.querySelector('.holding-select').value,
        holdingReason: document.querySelector('.holding-input').value
    };

    updateHistoryTable();
    setEditMode(false);
    alert('변경 완료!');
    if (confirm('초기화하시겠습니까?')) clearOngoingForm();
}

function cancelEdit() {
    if (confirm('취소하시겠습니까?')) { setEditMode(false); clearOngoingForm(); }
}
</script>
