<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEV ARCHIVE</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/ongoing.css">
    <link rel="stylesheet" href="css/modal.css">
    <link rel="stylesheet" href="css/history.css">
</head>
<body>
    <div class="container">
        <h1 class="title" id="page-title">I. CODEV ARCHIVE</h1>
        
        <!-- Tab Navigation -->
        <div class="tabs">
            <button class="tab active" data-tab="archive">ARCHIVE</button>
            <button class="tab" data-tab="ongoing">Ongoing Projects</button>
            <button class="tab" data-tab="history">History</button>
        </div>

        <!-- ARCHIVE Tab Content -->
        <div class="content-area tab-content active" id="archive-content">
            <!-- Left Panel: Year List -->
            <div class="left-panel">
                <div class="panel-header-with-button">
                    <h3 class="panel-title">연도별 보기</h3>
                    <button class="btn-add-folder" id="btn-add-year" title="연도 추가">
                        <span class="icon-plus">+</span>
                    </button>
                </div>
                <div class="year-list">
                    <div class="year-item active" data-year="2022">
                        <span class="year-number">2022</span>
                        <span class="year-info"></span>
                    </div>
                    <div class="year-item" data-year="2023">
                        <span class="year-number">2023</span>
                        <span class="year-info"></span>
                    </div>
                    <div class="year-item" data-year="2024">
                        <span class="year-number">2024</span>
                        <span class="year-info"></span>
                    </div>
                    <div class="year-item" data-year="2025">
                        <span class="year-number">2025</span>
                        <span class="year-info"></span>
                    </div>
                </div>
                <div class="footer-note">출시 일자 기준으로 관리</div>
            </div>

            <!-- Middle Panel: Project Tree (연도별) -->
            <div class="middle-panel">
                <div class="panel-header-with-button">
                    <h3 class="panel-title">브랜드</h3>
                    <button class="btn-add-folder" id="btn-add-brand" title="브랜드 추가">
                        <span class="icon-plus">+</span>
                    </button>
                </div>
                <div class="project-tree" id="project-tree">
                    <!-- 동적으로 생성됨 -->
                </div>
            </div>

            <!-- Right Panel: Product Details -->
            <div class="right-panel">
                <h3 class="panel-title">제품명</h3>
                <div class="product-detail" id="product-detail">
                    <p class="empty-message">하위 폴더를 선택하고 "+" 버튼을 클릭하여 제품명을 추가하세요</p>
                </div>
            </div>
        </div>

        <!-- Ongoing Projects Tab Content -->
        <div class="content-area tab-content" id="ongoing-content">
            <div class="ongoing-container">
                <h3 class="panel-title">자료 업로드 하기</h3>
                
                <!-- Filter Section -->
                <div class="filter-section">
                    <div class="filter-row">
                        <div class="filter-group">
                            <label>브랜드</label>
                            <select class="filter-select" id="ongoing-brand">
                                <option value="">선택</option>
                                <option value="액티비아">액티비아</option>
                                <option value="풀무원 요거트">풀무원 요거트</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>제품명</label>
                            <input type="text" class="filter-input" id="ongoing-product" placeholder="">
                        </div>
                        <div class="filter-group">
                            <label>프로젝트 명</label>
                            <input type="text" class="filter-input" id="ongoing-project" placeholder="">
                        </div>
                        <div class="filter-group">
                            <label>Gate</label>
                            <select class="filter-select" id="ongoing-gate">
                                <option value="">선택</option>
                                <option value="Go Define">Go Define</option>
                                <option value="Go Develop">Go Develop</option>
                                <option value="Go Implement">Go Implement</option>
                                <option value="Go Launch">Go Launch</option>
                                <option value="Closure">Closure</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>출시 년도</label>
                            <input type="date" class="filter-input filter-date" id="ongoing-year" placeholder="YYYY-MM-DD">
                        </div>
                    </div>
                </div>

                <!-- Report Table -->
                <div class="report-table">
                    <table>
                        <thead>
                            <tr>
                                <th>보고날짜</th>
                                <th>문서</th>
                                <th>회의록</th>
                            </tr>
                        </thead>
                        <tbody id="report-table-body">
                            <tr>
                                <td><input type="date" class="table-input"></td>
                                <td>
                                    <div class="doc-upload-cell">
                                        <button class="btn-upload-doc-table">파일 선택</button>
                                        <span class="doc-file-name"></span>
                                        <button class="btn-delete-doc-table" style="display: none;">×</button>
                                    </div>
                                </td>
                                <td><input type="text" class="table-input" placeholder="회의록 입력"></td>
                            </tr>
                            <tr>
                                <td><input type="date" class="table-input"></td>
                                <td>
                                    <div class="doc-upload-cell">
                                        <button class="btn-upload-doc-table">파일 선택</button>
                                        <span class="doc-file-name"></span>
                                        <button class="btn-delete-doc-table" style="display: none;">×</button>
                                    </div>
                                </td>
                                <td><input type="text" class="table-input" placeholder="회의록 입력"></td>
                            </tr>
                            <tr>
                                <td><input type="date" class="table-input"></td>
                                <td>
                                    <div class="doc-upload-cell">
                                        <button class="btn-upload-doc-table">파일 선택</button>
                                        <span class="doc-file-name"></span>
                                        <button class="btn-delete-doc-table" style="display: none;">×</button>
                                    </div>
                                </td>
                                <td><input type="text" class="table-input" placeholder="회의록 입력"></td>
                            </tr>
                            <tr>
                                <td><input type="date" class="table-input"></td>
                                <td>
                                    <div class="doc-upload-cell">
                                        <button class="btn-upload-doc-table">파일 선택</button>
                                        <span class="doc-file-name"></span>
                                        <button class="btn-delete-doc-table" style="display: none;">×</button>
                                    </div>
                                </td>
                                <td><input type="text" class="table-input" placeholder="회의록 입력"></td>
                            </tr>
                        </tbody>
                    </table>
                </div>

                <!-- Bottom Section -->
                <div class="bottom-section">
                    <div class="decision-section">
                        <label>REQUEST DECISION</label>
                        <div class="decision-row">
                            <span>서명날짜</span>
                            <input type="date" class="decision-input">
                            <div class="doc-upload-cell">
                                <button class="btn-upload-doc-table">파일 선택</button>
                                <span class="doc-file-name"></span>
                                <button class="btn-delete-doc-table" style="display: none;">×</button>
                            </div>
                        </div>
                    </div>
                    
                    <div class="holding-section">
                        <label>PROJECT HOLDING</label>
                        <div class="holding-row">
                            <select class="holding-select">
                                <option value="">선택</option>
                            </select>
                            <span>사유</span>
                            <input type="text" class="holding-input">
                        </div>
                    </div>
                </div>

                <!-- Save Button -->
                <div class="save-section">
                    <button class="btn-save">저장</button>
                </div>
            </div>
        </div>

        <!-- History Tab Content -->
        <div class="content-area tab-content" id="history-content">
            <div class="history-container">
                <h3 class="panel-title">History</h3>
                
                <!-- History Table -->
                <div class="history-table">
                    <table id="history-records">
                        <thead>
                            <tr>
                                <th>번호</th>
                                <th>저장일시</th>
                                <th>브랜드</th>
                                <th>제품명</th>
                                <th>프로젝트 명</th>
                                <th>Gate</th>
                                <th>출시 년도</th>
                                <th>보고날짜</th>
                                <th>문서</th>
                                <th>회의록</th>
                                <th>서명날짜</th>
                                <th>홀딩 상태</th>
                                <th>홀딩 사유</th>
                            </tr>
                        </thead>
                        <tbody id="history-tbody">
                            <tr class="empty-row">
                                <td colspan="13" style="text-align: center; padding: 40px; color: #999;">
                                    저장된 기록이 없습니다
                                </td>
                            </tr>
                        </tbody>
                    </table>
                </div>
                
                <!-- Export Button -->
                <div class="export-section">
                    <button class="btn-export" id="btn-export-excel">
                        <span>📥</span> Excel 다운로드
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/main.js"></script>
</body>
</html>
