<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>PLM 표지 디자인</title>
  <style>
    body {
      margin: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: #111;
    }
    svg {
      max-height: 95vh;
      box-shadow: 0 0 40px rgba(0,180,216,0.3);
    }
  </style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1100" width="800" height="1100">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0D1B2A;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#1B3A5C;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#00B4D8;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#90E0EF;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="circle1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00B4D8;stop-opacity:0.8" />
      <stop offset="100%" style="stop-color:#0077B6;stop-opacity:0.8" />
    </linearGradient>
    <linearGradient id="circle2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#48CAE4;stop-opacity:0.7" />
      <stop offset="100%" style="stop-color:#00B4D8;stop-opacity:0.7" />
    </linearGradient>
    <linearGradient id="circle3" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#90E0EF;stop-opacity:0.6" />
      <stop offset="100%" style="stop-color:#48CAE4;stop-opacity:0.6" />
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="800" height="1100" fill="url(#bg)"/>

  <!-- 장식 원형 -->
  <circle cx="650" cy="200" r="250" fill="#0077B6" opacity="0.1"/>
  <circle cx="150" cy="900" r="200" fill="#00B4D8" opacity="0.08"/>

  <!-- 상단 악센트 바 -->
  <rect x="0" y="0" width="800" height="8" fill="url(#accent)"/>

  <!-- 타이틀 -->
  <text x="400" y="140" text-anchor="middle" fill="white" font-size="52" font-family="Arial, sans-serif" font-weight="bold" letter-spacing="8">P  L  M</text>
  <rect x="250" y="160" width="300" height="3" fill="url(#accent)" rx="1"/>
  <text x="400" y="200" text-anchor="middle" fill="#90E0EF" font-size="18" font-family="Arial, sans-serif" letter-spacing="3">Product Lifecycle Management</text>
  <text x="400" y="230" text-anchor="middle" fill="#48CAE4" font-size="14" font-family="Arial, sans-serif" opacity="0.8">제품 수명주기 관리</text>

  <!-- 라이프사이클 외곽 원 -->
  <circle cx="400" cy="500" r="160" fill="none" stroke="#00B4D8" stroke-width="2" opacity="0.3"/>
  <circle cx="400" cy="500" r="120" fill="none" stroke="#48CAE4" stroke-width="1.5" opacity="0.2"/>

  <!-- 연결선 -->
  <line x1="432" y1="352" x2="510" y2="395" stroke="#48CAE4" stroke-width="2" opacity="0.5"/>
  <line x1="548" y1="465" x2="548" y2="535" stroke="#48CAE4" stroke-width="2" opacity="0.5"/>
  <line x1="510" y1="605" x2="432" y2="648" stroke="#48CAE4" stroke-width="2" opacity="0.5"/>
  <line x1="368" y1="648" x2="290" y2="605" stroke="#48CAE4" stroke-width="2" opacity="0.5"/>
  <line x1="252" y1="535" x2="252" y2="465" stroke="#48CAE4" stroke-width="2" opacity="0.5"/>
  <line x1="290" y1="395" x2="368" y2="352" stroke="#48CAE4" stroke-width="2" opacity="0.5"/>

  <!-- 기획 -->
  <circle cx="400" cy="340" r="45" fill="url(#circle1)"/>
  <text x="400" y="336" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="bold">기획</text>
  <text x="400" y="354" text-anchor="middle" fill="#CAF0F8" font-size="11" font-family="Arial, sans-serif">Plan</text>

  <!-- 설계 -->
  <circle cx="538" cy="420" r="45" fill="url(#circle1)"/>
  <text x="538" y="416" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="bold">설계</text>
  <text x="538" y="434" text-anchor="middle" fill="#CAF0F8" font-size="11" font-family="Arial, sans-serif">Design</text>

  <!-- 생산 -->
  <circle cx="538" cy="580" r="45" fill="url(#circle2)"/>
  <text x="538" y="576" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="bold">생산</text>
  <text x="538" y="594" text-anchor="middle" fill="#CAF0F8" font-size="11" font-family="Arial, sans-serif">Produce</text>

  <!-- 운영 -->
  <circle cx="400" cy="660" r="45" fill="url(#circle2)"/>
  <text x="400" y="656" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="bold">운영</text>
  <text x="400" y="674" text-anchor="middle" fill="#CAF0F8" font-size="11" font-family="Arial, sans-serif">Operate</text>

  <!-- 서비스 -->
  <circle cx="262" cy="580" r="45" fill="url(#circle3)"/>
  <text x="262" y="576" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="bold">서비스</text>
  <text x="262" y="594" text-anchor="middle" fill="#CAF0F8" font-size="11" font-family="Arial, sans-serif">Service</text>

  <!-- 폐기 -->
  <circle cx="262" cy="420" r="45" fill="url(#circle3)"/>
  <text x="262" y="416" text-anchor="middle" fill="white" font-size="16" font-family="Arial, sans-serif" font-weight="bold">폐기</text>
  <text x="262" y="434" text-anchor="middle" fill="#CAF0F8" font-size="11" font-family="Arial, sans-serif">Retire</text>

  <!-- 중앙 PLM -->
  <circle cx="400" cy="500" r="40" fill="#0D1B2A" stroke="#00B4D8" stroke-width="2"/>
  <text x="400" y="505" text-anchor="middle" fill="#00B4D8" font-size="18" font-family="Arial, sans-serif" font-weight="bold">PLM</text>

  <!-- 하단 텍스트 -->
  <rect x="100" y="820" width="600" height="1" fill="#48CAE4" opacity="0.3"/>
  <text x="400" y="870" text-anchor="middle" fill="#90E0EF" font-size="16" font-family="Arial, sans-serif" opacity="0.9">제품의 기획부터 폐기까지</text>
  <text x="400" y="895" text-anchor="middle" fill="#90E0EF" font-size="16" font-family="Arial, sans-serif" opacity="0.9">전체 수명주기를 통합 관리하는 솔루션</text>

  <rect x="350" y="940" width="100" height="3" fill="url(#accent)" rx="1"/>
  <text x="400" y="990" text-anchor="middle" fill="#48CAE4" font-size="13" font-family="Arial, sans-serif" opacity="0.6">Integrated Digital Solution</text>

  <!-- 하단 악센트 바 -->
  <rect x="0" y="1092" width="800" height="8" fill="url(#accent)"/>
</svg>

</body>
</html>
