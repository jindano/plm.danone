<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CODEV ARCHIVE</title>
    <style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',Arial,sans-serif;background:#f0f2f5;padding:20px}
.container{max-width:1500px;margin:0 auto;background:white;padding:30px;border-radius:12px;box-shadow:0 4px 20px rgba(0,0,0,.08)}
.title{font-size:22px;font-weight:600;margin-bottom:20px;color:#333}
.tabs{display:flex;gap:0;border-bottom:3px solid #8BC34A}
.tab{padding:12px 40px;border:none;background:#e8e8e8;cursor:pointer;font-size:15px;font-weight:500;color:#555;border-top-left-radius:8px;border-top-right-radius:8px;margin-right:4px;transition:all .3s}
.tab:hover{background:#d5d5d5}.tab.active{background:#8BC34A;color:white;font-weight:700}
.tab-content{display:none;border:2px solid #e0e0e0;border-top:none;min-height:620px;border-radius:0 0 8px 8px}
.tab-content.active{display:flex}
.left-panel{width:200px;min-width:200px;border-right:2px solid #e0e0e0;padding:20px;background:#fafafa}
.middle-panel{width:320px;min-width:320px;border-right:2px solid #e0e0e0;padding:20px;background:#fafafa;overflow-y:auto}
.right-panel{flex:1;padding:20px 25px;background:white;overflow-y:auto}
.panel-title{font-size:15px;font-weight:700;color:#333;margin-bottom:15px;padding-bottom:10px;border-bottom:2px solid #8BC34A}
.panel-header-with-button{display:flex;justify-content:space-between;align-items:center}
.panel-header-with-button .panel-title{flex:1}
.btn-add{width:30px;height:30px;border:2px solid #8BC34A;background:white;color:#8BC34A;border-radius:6px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:bold;transition:all .2s;margin-bottom:15px}
.btn-add:hover{background:#8BC34A;color:white}
.empty-message{text-align:center;color:#aaa;padding:40px 20px;font-size:13px;line-height:1.6}
.year-list{display:flex;flex-direction:column;gap:8px}
.year-item{padding:12px 15px;background:white;border:1px solid #ddd;border-radius:6px;cursor:pointer;transition:all .2s;font-size:17px;font-weight:700;color:#333}
.year-item:hover{border-color:#8BC34A;transform:translateX(3px)}
.year-item.active{border:2px solid #8BC34A;background:#f1f8e9}
.project-tree{display:flex;flex-direction:column;gap:10px}
.brand-item{border:1px solid #ddd;border-radius:6px;overflow:hidden}
.brand-header{display:flex;align-items:center;gap:8px;padding:10px 14px;background:#f5f5f5;cursor:pointer;user-select:none;transition:all .2s}
.brand-header:hover{background:#e8f5e9}.brand-header.active{background:#8BC34A;color:white}
.brand-name{font-size:14px;font-weight:700;flex:1}
.toggle-icon{width:16px;font-size:11px}
.btn-icon{width:22px;height:22px;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:12px;opacity:0;transition:all .2s}
.brand-header:hover .btn-icon,.brand-header.active .btn-icon{opacity:1}
.btn-edit-brand{border:1.5px solid #FF9800;background:white;color:#FF9800}
.btn-edit-brand:hover{background:#FF9800;color:white}
.brand-header.active .btn-edit-brand{border-color:white;color:white;background:transparent}
.btn-add-sub{border:1.5px solid #8BC34A;background:white;color:#8BC34A;font-size:14px;font-weight:bold}
.btn-add-sub:hover{background:#8BC34A;color:white}
.brand-header.active .btn-add-sub{border-color:white;color:white;background:transparent}
.brand-children{max-height:0;overflow:hidden;transition:max-height .3s;background:white}
.brand-children.expanded{max-height:800px;overflow-y:auto}
.sub-item{padding:9px 14px 9px 30px;border-top:1px solid #f0f0f0;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:8px;font-size:13px;color:#555}
.sub-item:hover{background:#f9f9f9}.sub-item.active{background:#e8f5e9;border-left:3px solid #8BC34A}
.sub-item .sub-name{flex:1}
.btn-sub-icon{width:20px;height:20px;border-radius:3px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:11px;opacity:0;transition:all .2s}
.sub-item:hover .btn-sub-icon{opacity:1}
.btn-edit-sub{border:1.5px solid #FF9800;background:white;color:#FF9800}
.btn-edit-sub:hover{background:#FF9800;color:white}
.btn-add-product{border:1.5px solid #8BC34A;background:white;color:#8BC34A;font-size:13px;font-weight:bold}
.btn-add-product:hover{background:#8BC34A;color:white}
.product-detail{display:flex;flex-direction:column;gap:12px}
.product-card{display:flex;align-items:center;gap:12px;padding:14px 16px;background:#f9f9f9;border:2px solid #e0e0e0;border-radius:8px;cursor:pointer;transition:all .2s}
.product-card:hover{background:#e8f5e9;border-color:#8BC34A;transform:translateX(4px)}
.product-card .p-icon{font-size:22px}
.product-card .p-name{font-size:14px;font-weight:600;color:#333;flex:1}
.product-card .p-badge{font-size:10px;padding:2px 8px;border-radius:10px;font-weight:600}
.product-card .p-badge.released{background:#e8f5e9;color:#558B2F}
.product-card .p-badge.manual{background:#E3F2FD;color:#1565C0}
.product-card .btn-del-product{width:26px;height:26px;border:1.5px solid #f44336;background:white;color:#f44336;border-radius:4px;cursor:pointer;display:flex;align-items:center;justify-content:center;font-size:16px;opacity:0;transition:all .2s}
.product-card:hover .btn-del-product{opacity:1}
.product-card .btn-del-product:hover{background:#f44336;color:white}
/* Add Project Button in right panel */
.btn-add-project-panel{display:flex;align-items:center;gap:8px;padding:12px 16px;background:#f5f5f5;border:2px dashed #8BC34A;border-radius:8px;cursor:pointer;transition:all .2s;color:#689F38;font-size:14px;font-weight:600;justify-content:center}
.btn-add-project-panel:hover{background:#e8f5e9;border-style:solid;transform:translateX(4px)}

/* MODAL */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);display:flex;justify-content:center;align-items:center;z-index:1000;animation:fadeIn .2s}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideUp{from{transform:translateY(20px);opacity:0}to{transform:translateY(0);opacity:1}}
.modal-box{background:white;border-radius:12px;width:420px;max-width:90%;box-shadow:0 10px 40px rgba(0,0,0,.25);overflow:hidden;animation:slideUp .3s}
.modal-hdr{display:flex;justify-content:space-between;align-items:center;padding:16px 20px;color:white}
.modal-hdr.green{background:#8BC34A}.modal-hdr.orange{background:#FF9800}.modal-hdr.blue{background:#2196F3}
.modal-hdr h3{font-size:15px;font-weight:600}
.modal-hdr .btn-close{width:26px;height:26px;border:none;background:rgba(255,255,255,.2);color:white;border-radius:50%;cursor:pointer;font-size:16px;display:flex;align-items:center;justify-content:center}
.modal-hdr .btn-close:hover{background:rgba(255,255,255,.35)}
.modal-body-edit{padding:20px}
.modal-body-edit label{display:block;font-size:12px;font-weight:600;color:#555;margin-bottom:5px}
.modal-body-edit .current-val{font-size:12px;color:#999;margin-bottom:10px;padding:7px 10px;background:#f5f5f5;border-radius:5px;border-left:3px solid #ddd}
.modal-body-edit input[type="text"],.modal-body-edit input[type="date"],.modal-body-edit textarea,.modal-body-edit select{width:100%;padding:9px 12px;border:2px solid #ddd;border-radius:6px;font-size:14px;outline:none}
.modal-body-edit input:focus,.modal-body-edit textarea:focus,.modal-body-edit select:focus{border-color:#8BC34A}
.modal-body-edit textarea{resize:vertical;min-height:60px;font-family:inherit}
.modal-body-edit .form-row{display:flex;gap:12px;margin-bottom:12px}
.modal-body-edit .form-row .form-col{flex:1;display:flex;flex-direction:column;gap:4px}
.modal-footer{display:flex;justify-content:space-between;align-items:center;padding:12px 20px;border-top:1px solid #eee;background:#fafafa}
.modal-footer .btn-del{padding:7px 16px;border:1.5px solid #f44336;background:white;color:#f44336;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}
.modal-footer .btn-del:hover{background:#f44336;color:white}
.modal-footer .btn-group{display:flex;gap:8px}
.modal-footer .btn-cancel{padding:7px 16px;border:1px solid #ddd;background:white;color:#666;border-radius:5px;cursor:pointer;font-size:12px}
.modal-footer .btn-save-modal{padding:7px 20px;border:none;background:linear-gradient(135deg,#8BC34A,#689F38);color:white;border-radius:5px;cursor:pointer;font-size:12px;font-weight:600}

/* Product Detail Modal */
.product-modal-content{background:white;border-radius:12px;width:95%;max-width:950px;max-height:90vh;overflow:hidden;box-shadow:0 10px 40px rgba(0,0,0,.2);animation:slideUp .3s}
.product-modal-body{padding:20px 25px;max-height:calc(90vh - 70px);overflow-y:auto}
.modal-section{margin-bottom:20px;padding-bottom:15px;border-bottom:1px solid #eee}
.modal-section:last-child{border-bottom:none}
.modal-section-title{font-size:14px;font-weight:700;color:#333;margin-bottom:12px}
.info-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;background:#f5f5f5;padding:14px;border-radius:8px;font-size:13px;line-height:1.6}
.info-grid .info-item{display:flex;gap:8px}
.info-grid .info-label{font-weight:700;color:#555;min-width:70px}
.info-grid .info-value{color:#333}
.report-modal-table{width:100%;border-collapse:collapse;font-size:12px}
.report-modal-table th{padding:8px 10px;background:#8BC34A;color:white;text-align:left;font-weight:600;border:1px solid #7CB342}
.report-modal-table td{padding:8px 10px;border:1px solid #e0e0e0}
.report-modal-table tbody tr:hover{background:#f5f5f5}
.report-modal-table tbody tr:nth-child(even){background:#fafafa}
.doc-type-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.doc-type-badge.status{background:#FF9800;color:white}.doc-type-badge.go{background:#4CAF50;color:white}
.decision-info{display:flex;gap:20px;padding:12px 14px;background:#E3F2FD;border:1px solid #90CAF9;border-left:4px solid #2196F3;border-radius:6px;font-size:13px}
.decision-info .d-label{font-weight:700;color:#1565C0}.decision-info .d-value{color:#333}
.holding-info{padding:12px 14px;background:#ffebee;border:1px solid #ef9a9a;border-left:4px solid #f44336;border-radius:6px;font-size:13px}
.holding-info .h-label{font-weight:700;color:#c62828}.holding-info .h-value{color:#333;margin-top:4px}
.holding-badge{display:inline-block;padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.holding-badge.on{background:#f44336;color:white}.holding-badge.off{background:#e0e0e0;color:#999}

/* ONGOING */
#ongoing-content,#history-content{padding:25px;background:white}
.ongoing-container{width:100%}
.filter-section{margin-bottom:20px}
.filter-row{display:flex;gap:14px;flex-wrap:wrap;align-items:flex-end}
.filter-group{display:flex;flex-direction:column;gap:4px;min-width:140px}
.filter-group label{font-size:12px;font-weight:600;color:#333}
.filter-select,.filter-input{padding:8px 10px;border:1px solid #ddd;border-radius:5px;font-size:13px;outline:none}
.filter-select:focus,.filter-input:focus{border-color:#8BC34A}
.filter-date{width:145px}
.filter-input:disabled{background:#f0f0f0;color:#999;cursor:not-allowed;opacity:.7}
.filter-group.disabled label{color:#999}
.manager-group label{color:#7B1FA2;font-weight:700}
.manager-input{padding:8px 10px;border:2px solid #9C27B0;border-radius:5px;font-size:13px;outline:none;background:#faf5fc}
.manager-input:focus{border-color:#7B1FA2;background:white}
.manager-input::placeholder{color:#BA68C8}
.tbd-group{min-width:90px}
.tbd-container{display:flex;align-items:center;gap:6px;padding:7px 10px;background:#fff8e1;border:1px solid #FFE082;border-radius:5px;cursor:pointer}
.tbd-container:hover{background:#ffecb3}.tbd-container.active{background:#FF9800;border-color:#FF9800}
.tbd-container.active .tbd-label{color:white}
.tbd-checkbox{width:16px;height:16px;cursor:pointer;accent-color:#FF9800}
.tbd-label{font-size:12px;color:#F57C00;cursor:pointer;font-weight:600}
.report-table{margin-bottom:20px;overflow-x:auto}
.report-table table{width:100%;border-collapse:collapse}
.report-table th{padding:9px 10px;border:1px solid #ddd;background:#f5f5f5;font-size:12px;font-weight:600;text-align:left}
.report-table td{padding:8px 10px;border:1px solid #ddd}
.table-input{width:100%;padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:12px;outline:none}
.table-input:focus{border-color:#8BC34A}
.doc-upload-cell{display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.btn-upload{padding:4px 10px;border:1px solid #8BC34A;background:white;color:#8BC34A;border-radius:4px;cursor:pointer;font-size:11px;white-space:nowrap}
.btn-upload:hover{background:#8BC34A;color:white}
.btn-upload.uploaded{background:#e8f5e9;border-color:#4CAF50;color:#4CAF50}
.btn-upload:disabled{background:#f0f0f0;border-color:#ccc;color:#999;cursor:not-allowed}
.doc-file-name{font-size:11px;color:#666;max-width:120px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.btn-del-doc{width:18px;height:18px;border:1px solid #f44336;background:white;color:#f44336;border-radius:3px;cursor:pointer;font-size:12px;display:flex;align-items:center;justify-content:center}
.btn-del-doc:hover{background:#f44336;color:white}
.doc-type-select{padding:4px 6px;border:2px solid #2196F3;border-radius:4px;font-size:11px;font-weight:600;outline:none;cursor:pointer;background:#E3F2FD;color:#1565C0;min-width:75px}
.doc-type-select.type-status{border-color:#FF9800;background:#FFF3E0;color:#E65100}
.doc-type-select.type-go{border-color:#4CAF50;background:#E8F5E9;color:#2E7D32}
.add-row-container{text-align:center;padding:12px 0;border-top:1px dashed #ddd;margin-top:8px}
.btn-add-row{background:linear-gradient(135deg,#4CAF50,#45a049);color:white;border:none;padding:8px 22px;border-radius:5px;cursor:pointer;font-size:13px;font-weight:600}
.btn-add-row:hover{transform:translateY(-1px)}
.btn-del-row{background:linear-gradient(135deg,#f44336,#d32f2f);color:white;border:none;padding:4px 10px;border-radius:4px;cursor:pointer;font-size:14px;font-weight:bold}
.bottom-section{display:flex;gap:25px;margin-bottom:20px}
.decision-section,.holding-section{flex:1;padding:14px;background:#fafafa;border:1px solid #ddd;border-radius:6px}
.decision-section.disabled{background:#f5f5f5;opacity:.7}
.decision-section.disabled label{color:#999}
.decision-section label,.holding-section>label{display:block;font-size:13px;font-weight:600;color:#333;margin-bottom:8px}
.disabled-message{display:none;font-size:11px;color:#FF9800;margin-top:6px;padding:5px 8px;background:#FFF3E0;border:1px solid #FFE082;border-radius:4px}
.decision-section.disabled .disabled-message{display:block}
.decision-row{display:flex;align-items:center;gap:8px;flex-wrap:wrap}
.decision-row span{font-size:12px;color:#666}
.decision-input{padding:6px 8px;border:1px solid #ddd;border-radius:4px;font-size:12px;outline:none}
.decision-input:disabled{background:#f0f0f0;cursor:not-allowed}
.holding-section.disabled-holding{background:#f5f5f5;border-color:#e0e0e0}
.holding-toggle-row{display:flex;align-items:center;gap:10px;margin-bottom:12px}
.holding-cb-container{display:flex;align-items:center;gap:6px;padding:6px 12px;background:#fce4ec;border:2px solid #ef9a9a;border-radius:6px;cursor:pointer;user-select:none}
.holding-cb-container:hover{background:#ffcdd2}
.holding-cb-container.active{background:#f44336;border-color:#d32f2f}
.holding-cb-container.active .holding-label{color:white}
.holding-cb{width:16px;height:16px;cursor:pointer;accent-color:#f44336}
.holding-label{font-size:13px;color:#c62828;cursor:pointer;font-weight:600}
.holding-status{font-size:11px;color:#999;font-style:italic}
.holding-status.on{color:#f44336;font-weight:600;font-style:normal}
.holding-detail{display:flex;flex-direction:column;gap:10px;background:#fff5f5;border:1px dashed #ef9a9a;border-radius:5px;max-height:0;overflow:hidden;opacity:0;transition:max-height .4s,opacity .3s,padding .3s;padding:0 12px}
.holding-detail.expanded{max-height:150px;opacity:1;padding:12px}
.holding-detail-row{display:flex;align-items:center;gap:8px}
.holding-detail-row label{font-size:12px;font-weight:600;color:#c62828;min-width:40px;margin-bottom:0}
.holding-input{flex:1;padding:7px 10px;border:2px solid #ef9a9a;border-radius:5px;font-size:12px;outline:none;background:white}
.holding-input:focus{border-color:#f44336}
.holding-input:disabled{background:#f0f0f0;cursor:not-allowed}
.holding-disabled-msg{font-size:11px;color:#999;text-align:center;padding:8px}
.save-section{display:flex;justify-content:flex-end;gap:10px}
.btn-save{padding:10px 36px;background:#8BC34A;color:white;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.btn-save:hover{background:#7CB342;transform:translateY(-2px)}
.btn-update{padding:10px 28px;background:linear-gradient(135deg,#FF9800,#F57C00);color:white;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.btn-update:hover{transform:translateY(-2px)}
.btn-cancel-edit{padding:10px 28px;background:linear-gradient(135deg,#9E9E9E,#757575);color:white;border:none;border-radius:6px;font-size:14px;font-weight:600;cursor:pointer}
.edit-indicator{background:#FFF3E0;border:2px solid #FF9800;border-radius:8px;padding:10px 14px;margin-bottom:14px;font-size:13px;color:#E65100;font-weight:600}
.history-container{width:100%}
.history-table{margin-top:18px;overflow-x:auto;border-radius:8px;box-shadow:0 2px 8px rgba(0,0,0,.08)}
#history-table{width:100%;border-collapse:collapse;min-width:1600px}
#history-table thead{background:#8BC34A;color:white;position:sticky;top:0;z-index:10}
#history-table th{padding:10px 8px;text-align:left;font-weight:600;font-size:12px;border:1px solid #7CB342;white-space:nowrap}
#history-table th.mgr-col{background:#7B1FA2;border-color:#6A1B9A}
#history-table th.dtype-col{background:#2196F3;border-color:#1976D2}
#history-table th.hold-col{background:#f44336;border-color:#d32f2f}
#history-table td{padding:8px;border:1px solid #e0e0e0;font-size:12px;color:#333}
#history-table td:first-child{text-align:center;font-weight:600;color:#8BC34A}
#history-table td.mgr-cell{background:#faf5fc;color:#7B1FA2;font-weight:600}
#history-table td.dtype-cell{font-weight:600;text-align:center}
#history-table td.dtype-cell.type-status{background:#FFF3E0;color:#E65100}
#history-table td.dtype-cell.type-go{background:#E8F5E9;color:#2E7D32}
#history-table td.hold-cell{background:#ffebee;color:#c62828;font-weight:600}
#history-table tbody tr:not(.empty-row):hover{background:#f5f5f5}
.doc-link{color:#2196F3;text-decoration:none;font-size:12px}.doc-link:hover{text-decoration:underline}
.btn-release{padding:5px 14px;border:2px solid #2196F3;background:linear-gradient(135deg,#2196F3,#1976D2);color:white;border-radius:5px;cursor:pointer;font-size:12px;font-weight:700;white-space:nowrap}
.btn-release:hover{transform:translateY(-1px)}
.btn-release.released{background:linear-gradient(135deg,#4CAF50,#388E3C);border-color:#4CAF50;cursor:default;opacity:.7}
.btn-release.released:hover{transform:none}
.btn-edit-hist{background:linear-gradient(135deg,#2196F3,#1976D2);color:white;border:none;padding:5px 10px;border-radius:4px;cursor:pointer;font-size:11px}
.btn-del-hist{padding:5px 10px;border:1px solid #f44336;background:white;color:#f44336;border-radius:4px;cursor:pointer;font-size:11px;font-weight:600}
.btn-del-hist:hover{background:#f44336;color:white}
.export-section{margin-top:18px;display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}
.btn-export{padding:9px 22px;border:1px solid #4CAF50;background:white;color:#4CAF50;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-export:hover{background:#4CAF50;color:white}
.btn-del-all{padding:9px 22px;border:1px solid #f44336;background:white;color:#f44336;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-del-all:hover{background:#f44336;color:white}
.btn-clear-all{padding:9px 22px;border:1px solid #FF5722;background:white;color:#FF5722;border-radius:6px;cursor:pointer;font-size:13px;font-weight:600}
.btn-clear-all:hover{background:#FF5722;color:white}
.save-indicator{position:fixed;bottom:20px;right:20px;padding:10px 20px;background:#4CAF50;color:white;border-radius:6px;font-size:13px;font-weight:600;box-shadow:0 4px 12px rgba(0,0,0,.2);z-index:9999;opacity:0;transition:opacity .3s;pointer-events:none}
.save-indicator.show{opacity:1}
@media(max-width:768px){.tab-content.active{flex-direction:column}.left-panel,.middle-panel{width:100%;min-width:100%;border-right:none;border-bottom:2px solid #e0e0e0}.filter-row,.bottom-section{flex-direction:column}}
    </style>
</head>
<body>
<div class="container">
    <h1 class="title" id="page-title">I. CODEV ARCHIVE</h1>
    <div class="tabs">
        <button class="tab active" data-tab="archive">ARCHIVE</button>
        <button class="tab" data-tab="ongoing">Ongoing Projects</button>
        <button class="tab" data-tab="history">History</button>
    </div>

    <!-- ARCHIVE -->
    <div class="tab-content active" id="archive-content">
        <div class="left-panel">
            <div class="panel-header-with-button"><h3 class="panel-title">연도</h3><button class="btn-add" id="btn-add-year">+</button></div>
            <div class="year-list" id="year-list"></div>
        </div>
        <div class="middle-panel">
            <div class="panel-header-with-button"><h3 class="panel-title">브랜드 / 제품</h3><button class="btn-add" id="btn-add-brand">+</button></div>
            <div class="project-tree" id="project-tree"></div>
        </div>
        <div class="right-panel">
            <h3 class="panel-title" id="right-panel-title">프로젝트 목록</h3>
            <div class="product-detail" id="product-detail"><p class="empty-message">좌측에서 브랜드 또는 제품 폴더를 선택하세요</p></div>
        </div>
    </div>

    <!-- ONGOING -->
    <div class="tab-content" id="ongoing-content">
        <div class="ongoing-container">
            <h3 class="panel-title">프로젝트 등록</h3>
            <div class="filter-section"><div class="filter-row">
                <div class="filter-group"><label>브랜드</label><select class="filter-select" id="ongoing-brand"><option value="">선택</option></select></div>
                <div class="filter-group"><label>제품명</label><input type="text" class="filter-input" id="ongoing-product" placeholder="제품명"></div>
                <div class="filter-group"><label>프로젝트명</label><input type="text" class="filter-input" id="ongoing-project" placeholder="프로젝트명"></div>
                <div class="filter-group"><label>Gate</label><select class="filter-select" id="ongoing-gate"><option value="">선택</option><option value="Go Define">Go Define</option><option value="Go Develop">Go Develop</option><option value="Go Implement">Go Implement</option><option value="Go Launch">Go Launch</option><option value="Closure">Closure</option></select></div>
                <div class="filter-group" id="year-group"><label>일자</label><input type="date" class="filter-input filter-date" id="ongoing-year"></div>
                <div class="filter-group tbd-group"><label>TBD</label><div class="tbd-container" id="tbd-container"><input type="checkbox" id="ongoing-tbd" class="tbd-checkbox"><label for="ongoing-tbd" class="tbd-label">TBD</label></div></div>
                <div class="filter-group manager-group"><label>담당자</label><input type="text" class="filter-input manager-input" id="ongoing-manager" placeholder="담당자"></div>
            </div></div>
            <div class="report-table"><table><thead><tr><th>보고일</th><th>문서</th><th>문서유형</th><th>비고</th><th style="width:45px">삭제</th></tr></thead><tbody id="report-tbody"></tbody></table>
                <div class="add-row-container"><button class="btn-add-row" id="btn-add-report-row">+ 행 추가</button></div></div>
            <div class="bottom-section">
                <div class="decision-section disabled" id="decision-section"><label>REQUEST DECISION</label>
                    <div class="decision-row"><span>결재일:</span><input type="date" class="decision-input" id="decision-date" disabled>
                        <div class="doc-upload-cell" id="decision-upload-cell"><button class="btn-upload" id="decision-upload-btn" disabled>파일선택</button><span class="doc-file-name"></span><button class="btn-del-doc" style="display:none">×</button></div></div>
                    <div class="disabled-message">문서유형 "Go" 선택 시 활성화됩니다.</div></div>
                <div class="holding-section disabled-holding" id="holding-section"><label>PROJECT HOLDING</label>
                    <div class="holding-toggle-row"><div class="holding-cb-container" id="holding-cb-container"><input type="checkbox" id="holding-toggle" class="holding-cb"><label for="holding-toggle" class="holding-label">Holding</label></div><span class="holding-status" id="holding-status">체크하면 홀딩 사유를 입력합니다</span></div>
                    <div class="holding-detail" id="holding-detail"><div class="holding-detail-row"><label>사유</label><input type="text" class="holding-input" id="holding-reason" placeholder="홀딩 사유..." disabled></div></div>
                    <div class="holding-disabled-msg" id="holding-disabled-msg">홀딩 비활성 상태</div></div>
            </div>
            <div class="save-section"><button class="btn-save" id="btn-save">저장</button><button class="btn-update" id="btn-update" style="display:none">수정 저장</button><button class="btn-cancel-edit" id="btn-cancel-edit" style="display:none">취소</button></div>
        </div>
    </div>

    <!-- HISTORY -->
    <div class="tab-content" id="history-content">
        <div class="history-container"><h3 class="panel-title">History</h3>
            <div class="history-table"><table id="history-table"><thead><tr>
                <th>No</th><th>브랜드</th><th>제품</th><th>프로젝트</th><th class="mgr-col">담당자</th><th>Gate</th><th>일자</th><th>TBD</th>
                <th>보고일</th><th>문서</th><th class="dtype-col">유형</th><th>비고</th><th>결재일</th><th class="hold-col">Holding</th><th class="hold-col">사유</th>
                <th>Release</th><th>수정</th><th>삭제</th>
            </tr></thead><tbody id="history-tbody"><tr class="empty-row"><td colspan="18" style="text-align:center;padding:40px;color:#999">저장된 기록이 없습니다</td></tr></tbody></table></div>
            <div class="export-section"><button class="btn-clear-all" id="btn-clear-storage">전체 초기화</button><button class="btn-del-all" id="btn-del-all">기록 전체삭제</button><button class="btn-export" id="btn-export">Excel 내보내기</button></div>
        </div>
    </div>
</div>
<div class="save-indicator" id="save-indicator">저장 완료!</div>

<script>
const SK={DATA:'codev_pd',HIST:'codev_hr',REL:'codev_rf'};
const defaultData={
    '2022':{projects:[{name:'ACTIVIA',subProjects:[],products:{'_direct':[]}}]},
    '2023':{projects:[{name:'A',subProjects:['1','2','3'],products:{'_direct':[],'1':[],'2':[],'3':[]}}]},
    '2024':{projects:[{name:'B',subProjects:['1','2','3'],products:{'_direct':[],'1':[],'2':[],'3':[]}}]},
    '2025':{projects:[{name:'C',subProjects:['1','2','3'],products:{'_direct':[],'1':[],'2':[],'3':[]}}]}
};

let projectData=JSON.parse(JSON.stringify(defaultData));
let releasedFiles={};
let historyRecords=[];
let currentYear=null,currentBrand=null,currentSub=null,editingId=null;

function uid(){return Date.now().toString(36)+'_'+Math.random().toString(36).substr(2,8)}
function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML}
function csvE(s){return'"'+String(s||'').replace(/"/g,'""')+'"'}
function showInd(){const e=document.getElementById('save-indicator');e.classList.add('show');setTimeout(()=>e.classList.remove('show'),2000)}

function saveAll(){try{localStorage.setItem(SK.DATA,JSON.stringify(projectData));localStorage.setItem(SK.HIST,JSON.stringify(historyRecords));localStorage.setItem(SK.REL,JSON.stringify(releasedFiles));showInd()}catch(e){alert('저장 실패')}}
function loadAll(){try{const d=localStorage.getItem(SK.DATA),h=localStorage.getItem(SK.HIST),r=localStorage.getItem(SK.REL);if(d){Object.keys(projectData).forEach(k=>delete projectData[k]);Object.assign(projectData,JSON.parse(d))}if(h){historyRecords.length=0;JSON.parse(h).forEach(x=>{if(!x.id||typeof x.id==='number')x.id=uid();historyRecords.push(x)})}if(r){Object.keys(releasedFiles).forEach(k=>delete releasedFiles[k]);Object.assign(releasedFiles,JSON.parse(r))}}catch(e){}}
function clearStorage(){if(!confirm('모든 데이터를 초기화하시겠습니까?'))return;Object.values(SK).forEach(k=>localStorage.removeItem(k));location.reload()}

// TABS
function initTabs(){const tabs=document.querySelectorAll('.tab'),conts=document.querySelectorAll('.tab-content'),ti=document.getElementById('page-title');
    const t={archive:'I. CODEV ARCHIVE',ongoing:'II. Ongoing Projects',history:'III. History'};
    tabs.forEach(tab=>tab.addEventListener('click',function(){tabs.forEach(x=>x.classList.remove('active'));conts.forEach(x=>x.classList.remove('active'));this.classList.add('active');const n=this.dataset.tab;document.getElementById(n+'-content')?.classList.add('active');if(ti)ti.textContent=t[n]||'';if(n==='ongoing')updateBrandOpts();if(n==='history')renderHistory()}))}
function updateBrandOpts(){const sel=document.getElementById('ongoing-brand'),cur=sel.value;while(sel.options.length>1)sel.remove(1);const b=new Set();Object.values(projectData).forEach(y=>y.projects?.forEach(p=>b.add(p.name)));b.forEach(x=>{const o=document.createElement('option');o.value=x;o.textContent=x;sel.appendChild(o)});if([...sel.options].some(o=>o.value===cur))sel.value=cur}

// YEARS
function renderYears(){const l=document.getElementById('year-list');l.innerHTML='';Object.keys(projectData).sort().forEach((y,i)=>{const e=document.createElement('div');e.className='year-item'+(i===0?' active':'');e.textContent=y;e.addEventListener('click',()=>{l.querySelectorAll('.year-item').forEach(x=>x.classList.remove('active'));e.classList.add('active');loadYear(y)});l.appendChild(e)});const ys=Object.keys(projectData).sort();if(ys.length)loadYear(ys[0])}
function loadYear(y){currentYear=y;currentBrand=null;currentSub=null;renderTree();document.getElementById('right-panel-title').textContent='프로젝트 목록';document.getElementById('product-detail').innerHTML='<p class="empty-message">좌측에서 브랜드 또는 제품 폴더를 선택하세요</p>'}

// TREE
function renderTree(){const t=document.getElementById('project-tree');t.innerHTML='';const d=projectData[currentYear];if(!d?.projects?.length){t.innerHTML='<p class="empty-message">등록된 브랜드가 없습니다</p>';return}d.projects.forEach(p=>t.appendChild(buildBrand(p)))}

function buildBrand(brand){
    const w=document.createElement('div');w.className='brand-item';
    const h=document.createElement('div');h.className='brand-header';
    const hs=brand.subProjects?.length>0;
    h.innerHTML=`${hs?'<span class="toggle-icon">▶</span>':'<span class="toggle-icon" style="visibility:hidden">▶</span>'}<span class="brand-name">${esc(brand.name)}</span><button class="btn-icon btn-edit-brand">✏</button><button class="btn-icon btn-add-sub">+</button>`;
    h.querySelector('.btn-edit-brand').addEventListener('click',e=>{e.stopPropagation();editBrand(brand.name)});
    h.querySelector('.btn-add-sub').addEventListener('click',e=>{e.stopPropagation();addSub(brand)});
    const ch=document.createElement('div');ch.className='brand-children';
    if(hs){brand.subProjects.forEach(sub=>{const si=document.createElement('div');si.className='sub-item';
        si.innerHTML=`<span class="sub-name">${esc(sub)}</span><button class="btn-sub-icon btn-edit-sub">✏</button><button class="btn-sub-icon btn-add-product">+</button>`;
        si.querySelector('.sub-name').addEventListener('click',e=>{e.stopPropagation();selectSub(sub,si,brand.name)});
        si.querySelector('.btn-edit-sub').addEventListener('click',e=>{e.stopPropagation();editSub(brand.name,sub)});
        si.querySelector('.btn-add-product').addEventListener('click',e=>{e.stopPropagation();addProduct(brand.name,sub)});
        ch.appendChild(si)})}
    h.addEventListener('click',function(e){if(e.target.closest('.btn-icon'))return;if(hs){const ic=h.querySelector('.toggle-icon');if(ch.classList.contains('expanded')){ch.classList.remove('expanded');ic.textContent='▶';h.classList.remove('active')}else{ch.classList.add('expanded');ic.textContent='▼';h.classList.add('active');currentBrand=brand.name;currentSub='_direct';loadProducts(brand.name,'_direct')}}else{document.querySelectorAll('.brand-header').forEach(x=>x.classList.remove('active'));h.classList.add('active');currentBrand=brand.name;currentSub='_direct';loadProducts(brand.name,'_direct')}});
    w.appendChild(h);w.appendChild(ch);return w}

function selectSub(sub,el,bn){document.querySelectorAll('.brand-header,.sub-item').forEach(x=>x.classList.remove('active'));el.classList.add('active');currentBrand=bn;currentSub=sub;loadProducts(bn,sub)}

// ★ PRODUCTS - 프로젝트 목록 + 신규 추가 버튼
function loadProducts(bn,sk){
    const det=document.getElementById('product-detail');det.innerHTML='';
    const tEl=document.getElementById('right-panel-title');
    tEl.textContent=sk==='_direct'?`${bn} - 프로젝트 목록`:`${bn} > ${sk} - 프로젝트 목록`;
    const brand=projectData[currentYear]?.projects.find(p=>p.name===bn);
    const products=brand?.products?.[sk];
    if(products?.length){
        products.forEach((pj,idx)=>{
            const key=sk+'::'+pj;const rd=releasedFiles[key];
            const isReleased=!!rd;
            const card=document.createElement('div');card.className='product-card';
            card.innerHTML=`<span class="p-icon">${isReleased?'📋':'📝'}</span><span class="p-name">${esc(pj)}</span><span class="p-badge ${isReleased?'released':'manual'}">${isReleased?'Released':'수동등록'}</span><button class="btn-del-product">×</button>`;
            card.addEventListener('click',e=>{if(!e.target.closest('.btn-del-product'))showProjectModal(pj,sk,bn)});
            card.querySelector('.btn-del-product').addEventListener('click',e=>{e.stopPropagation();if(confirm(`"${pj}" 삭제?`)){products.splice(idx,1);const k2=sk+'::'+pj;if(releasedFiles[k2])delete releasedFiles[k2];loadProducts(bn,sk);saveAll()}});
            det.appendChild(card)});
    }
    // ★ 신규 프로젝트 추가 버튼
    const addBtn=document.createElement('div');addBtn.className='btn-add-project-panel';
    addBtn.innerHTML='+ 새 프로젝트 추가';
    addBtn.addEventListener('click',()=>showAddProjectModal(bn,sk));
    det.appendChild(addBtn);
}

// ★★★ 신규 프로젝트 추가 모달
function showAddProjectModal(brandName,subKey){
    document.getElementById('add-project-modal')?.remove();
    const ov=document.createElement('div');ov.id='add-project-modal';ov.className='modal-overlay';
    ov.innerHTML=`<div class="modal-box" style="width:520px">
        <div class="modal-hdr blue"><h3>새 프로젝트 등록</h3><button class="btn-close">×</button></div>
        <div class="modal-body-edit">
            <div class="form-row">
                <div class="form-col"><label>프로젝트명 *</label><input type="text" id="new-proj-name" placeholder="프로젝트명"></div>
                <div class="form-col"><label>담당자</label><input type="text" id="new-proj-manager" placeholder="담당자"></div>
            </div>
            <div class="form-row">
                <div class="form-col"><label>Gate</label><select id="new-proj-gate"><option value="">선택</option><option value="Go Define">Go Define</option><option value="Go Develop">Go Develop</option><option value="Go Implement">Go Implement</option><option value="Go Launch">Go Launch</option><option value="Closure">Closure</option></select></div>
                <div class="form-col"><label>일자</label><input type="date" id="new-proj-date"></div>
            </div>
            <div style="margin-bottom:12px"><label>메모</label><textarea id="new-proj-memo" placeholder="프로젝트 관련 메모..."></textarea></div>
        </div>
        <div class="modal-footer"><div></div><div class="btn-group"><button class="btn-cancel">취소</button><button class="btn-save-modal">등록</button></div></div></div>`;
    document.body.appendChild(ov);
    const close=()=>ov.remove();
    ov.querySelector('.btn-close').addEventListener('click',close);
    ov.querySelector('.btn-cancel').addEventListener('click',close);
    ov.addEventListener('click',e=>{if(e.target===ov)close()});
    setTimeout(()=>document.getElementById('new-proj-name').focus(),100);
    document.getElementById('new-proj-name').addEventListener('keydown',e=>{if(e.key==='Enter')ov.querySelector('.btn-save-modal').click()});

    ov.querySelector('.btn-save-modal').addEventListener('click',()=>{
        const name=document.getElementById('new-proj-name').value.trim();
        if(!name){alert('프로젝트명을 입력하세요.');return}
        const brand=projectData[currentYear]?.projects.find(p=>p.name===brandName);
        if(!brand)return;
        if(!brand.products[subKey])brand.products[subKey]=[];
        if(brand.products[subKey].includes(name)){alert('이미 존재하는 프로젝트입니다.');return}

        // 프로젝트를 products 배열에 추가
        brand.products[subKey].push(name);

        // releasedFiles에 수동 입력 정보 저장
        const key=subKey+'::'+name;
        releasedFiles[key]={
            projectInfo:{
                brand:brandName,
                product:subKey==='_direct'?brandName:subKey,
                project:name,
                manager:document.getElementById('new-proj-manager').value.trim()||'',
                gate:document.getElementById('new-proj-gate').value||'',
                year:document.getElementById('new-proj-date').value||'',
                tbd:false
            },
            reports:[],
            signatureDate:'',
            decisionDocument:'',
            holdingActive:false,
            holdingReason:'',
            memo:document.getElementById('new-proj-memo').value.trim()||'',
            manualEntry:true,
            createdAt:new Date().toISOString()
        };

        loadProducts(brandName,subKey);saveAll();close();
    });
}

// ★ 프로젝트 상세 모달 - 편집 가능
function showProjectModal(projName,subKey,brandName){
    document.getElementById('project-detail-modal')?.remove();
    const key=subKey+'::'+projName;
    const data=releasedFiles[key];
    const ov=document.createElement('div');ov.id='project-detail-modal';ov.className='modal-overlay';
    ov.innerHTML=`<div class="product-modal-content">
        <div class="modal-hdr green"><h3>${esc(projName)}</h3><button class="btn-close">×</button></div>
        <div class="product-modal-body">${data?buildDetail(data,key):'<p class="empty-message">등록된 정보가 없습니다.<br>이 프로젝트의 정보를 입력하시려면<br>삭제 후 다시 추가하거나, Ongoing 탭에서 등록하세요.</p>'}</div></div>`;
    ov.querySelector('.btn-close').addEventListener('click',()=>ov.remove());
    ov.addEventListener('click',e=>{if(e.target===ov)ov.remove()});
    document.body.appendChild(ov);
}

function buildDetail(data,key){
    let h='';
    const isManual=data.manualEntry;
    if(data.projectInfo){const pi=data.projectInfo;
        h+=`<div class="modal-section"><div class="modal-section-title">프로젝트 정보 ${isManual?'<span style="color:#1565C0;font-size:11px;background:#E3F2FD;padding:2px 8px;border-radius:10px;margin-left:8px">수동등록</span>':'<span style="color:#558B2F;font-size:11px;background:#e8f5e9;padding:2px 8px;border-radius:10px;margin-left:8px">Released</span>'}</div>
            <div class="info-grid">
                <div class="info-item"><span class="info-label">브랜드</span><span class="info-value">${esc(pi.brand)}</span></div>
                <div class="info-item"><span class="info-label">제품명</span><span class="info-value">${esc(pi.product||'-')}</span></div>
                <div class="info-item"><span class="info-label">프로젝트</span><span class="info-value">${esc(pi.project||'-')}</span></div>
                <div class="info-item"><span class="info-label">담당자</span><span class="info-value">${esc(pi.manager||'-')}</span></div>
                <div class="info-item"><span class="info-label">Gate</span><span class="info-value">${esc(pi.gate||'-')}</span></div>
                <div class="info-item"><span class="info-label">일자</span><span class="info-value">${pi.tbd?'<span style="color:#FF9800;font-weight:700">TBD</span>':esc(pi.year||'-')}</span></div>
            </div></div>`}
    if(data.memo){h+=`<div class="modal-section"><div class="modal-section-title">메모</div><div style="background:#f5f5f5;padding:12px;border-radius:6px;font-size:13px;white-space:pre-wrap">${esc(data.memo)}</div></div>`}
    if(data.reports?.length){
        h+=`<div class="modal-section"><div class="modal-section-title">보고 기록 (${data.reports.length}건)</div>
            <table class="report-modal-table"><thead><tr><th>보고일</th><th>문서</th><th>유형</th><th>비고</th></tr></thead><tbody>`;
        data.reports.forEach(r=>{const badge=r.docType?`<span class="doc-type-badge ${r.docType.toLowerCase()}">${esc(r.docType)}</span>`:'—';
            h+=`<tr><td>${esc(r.reportDate||'-')}</td><td>${r.document?esc(r.document):'—'}</td><td style="text-align:center">${badge}</td><td>${esc(r.meetingNote||'-')}</td></tr>`});
        h+=`</tbody></table></div>`}
    if(data.signatureDate||data.decisionDocument){
        h+=`<div class="modal-section"><div class="modal-section-title">결재 정보</div>
            <div class="decision-info"><div><span class="d-label">결재일: </span><span class="d-value">${esc(data.signatureDate||'-')}</span></div>
                <div><span class="d-label">문서: </span><span class="d-value">${data.decisionDocument?esc(data.decisionDocument):'—'}</span></div></div></div>`}
    if(data.holdingActive!==undefined){
        h+=`<div class="modal-section"><div class="modal-section-title">Holding 상태</div>`;
        if(data.holdingActive)h+=`<div class="holding-info"><div class="h-label">프로젝트 홀딩 중</div><div class="h-value"><strong>사유:</strong> ${esc(data.holdingReason||'미입력')}</div></div>`;
        else h+=`<div style="padding:10px;background:#E8F5E9;border-radius:6px;font-size:13px;color:#2E7D32">홀딩 없음 — 정상 진행</div>`;
        h+=`</div>`}
    return h||'<p class="empty-message">기록 없음</p>'}

// ARCHIVE BUTTONS
function initArchiveBtns(){
    document.getElementById('btn-add-year').addEventListener('click',()=>{const yr=prompt('추가할 연도 (예: 2026):');if(!yr)return;const t=yr.trim();if(!/^\d{4}$/.test(t)){alert('4자리 숫자');return}if(projectData[t]){alert('이미 존재');return}projectData[t]={projects:[]};renderYears();saveAll()});
    document.getElementById('btn-add-brand').addEventListener('click',()=>{const name=prompt('브랜드명:');if(!name?.trim())return;if(!currentYear){alert('연도 선택');return}if(!projectData[currentYear])projectData[currentYear]={projects:[]};if(projectData[currentYear].projects.some(p=>p.name===name.trim())){alert('중복');return}projectData[currentYear].projects.push({name:name.trim(),subProjects:[],products:{'_direct':[]}});renderTree();updateBrandOpts();saveAll()})}
function addSub(brand){const name=prompt(`"${brand.name}"에 추가할 제품 폴더명:`);if(!name?.trim())return;const p=projectData[currentYear]?.projects.find(pr=>pr.name===brand.name);if(!p)return;if(!p.subProjects)p.subProjects=[];if(p.subProjects.includes(name.trim())){alert('중복');return}p.subProjects.push(name.trim());if(!p.products)p.products={'_direct':[]};p.products[name.trim()]=[];renderTree();saveAll()}
function addProduct(bn,sn){showAddProjectModal(bn,sn)}

// EDIT MODAL
function showEditModal(opts){document.getElementById('edit-modal')?.remove();const ov=document.createElement('div');ov.id='edit-modal';ov.className='modal-overlay';
    ov.innerHTML=`<div class="modal-box"><div class="modal-hdr orange"><h3>${esc(opts.title)}</h3><button class="btn-close">×</button></div><div class="modal-body-edit"><label>현재 이름</label><div class="current-val">${esc(opts.currentName)}</div><label>새 이름</label><input type="text" id="edit-input" value="${esc(opts.currentName)}"></div><div class="modal-footer"><button class="btn-del">삭제</button><div class="btn-group"><button class="btn-cancel">취소</button><button class="btn-save-modal">저장</button></div></div></div>`;
    document.body.appendChild(ov);const input=document.getElementById('edit-input');setTimeout(()=>{input.focus();input.select()},100);
    const close=()=>ov.remove();ov.querySelector('.btn-close').addEventListener('click',close);ov.querySelector('.btn-cancel').addEventListener('click',close);ov.addEventListener('click',e=>{if(e.target===ov)close()});
    input.addEventListener('keydown',e=>{if(e.key==='Enter')ov.querySelector('.btn-save-modal').click();if(e.key==='Escape')close()});
    ov.querySelector('.btn-save-modal').addEventListener('click',()=>{const n=input.value.trim();if(!n){alert('입력');return}if(n===opts.currentName){close();return}if(opts.onSave(n)!==false)close()});
    ov.querySelector('.btn-del').addEventListener('click',()=>{if(opts.onDelete?.()!==false)close()})}
function editBrand(bn){if(!currentYear||!projectData[currentYear])return;const idx=projectData[currentYear].projects.findIndex(p=>p.name===bn);if(idx===-1)return;
    showEditModal({title:'브랜드 수정',currentName:bn,onSave(n){if(projectData[currentYear].projects.some((p,i)=>i!==idx&&p.name===n)){alert('중복');return false}const old=projectData[currentYear].projects[idx].name;projectData[currentYear].projects[idx].name=n;historyRecords.forEach(r=>{if(r.brand===old)r.brand=n});Object.keys(releasedFiles).forEach(k=>{if(releasedFiles[k].projectInfo?.brand===old)releasedFiles[k].projectInfo.brand=n});renderTree();updateBrandOpts();renderHistory();saveAll()},
        onDelete(){if(!confirm(`"${bn}" 삭제?`))return false;projectData[currentYear].projects.splice(idx,1);renderTree();updateBrandOpts();saveAll();if(currentBrand===bn){currentBrand=null;document.getElementById('product-detail').innerHTML='<p class="empty-message">선택</p>'}}})}
function editSub(bn,sn){if(!currentYear)return;const brand=projectData[currentYear].projects.find(p=>p.name===bn);if(!brand)return;const si=brand.subProjects.indexOf(sn);if(si===-1)return;
    showEditModal({title:'폴더 수정',currentName:sn,onSave(n){if(brand.subProjects.some((s,i)=>i!==si&&s===n)){alert('중복');return false}brand.subProjects[si]=n;if(brand.products?.[sn]!==undefined){brand.products[n]=brand.products[sn];delete brand.products[sn]}
        // releasedFiles 키도 변경
        Object.keys(releasedFiles).forEach(k=>{if(k.startsWith(sn+'::')){const newK=n+'::'+k.split('::')[1];releasedFiles[newK]=releasedFiles[k];delete releasedFiles[k]}});
        if(currentSub===sn)currentSub=n;renderTree();saveAll()},
        onDelete(){if(!confirm(`"${sn}" 삭제?`))return false;brand.subProjects.splice(si,1);if(brand.products)delete brand.products[sn];
            Object.keys(releasedFiles).forEach(k=>{if(k.startsWith(sn+'::'))delete releasedFiles[k]});
            renderTree();saveAll();if(currentSub===sn){currentSub=null;document.getElementById('product-detail').innerHTML='<p class="empty-message">선택</p>'}}})}

// TBD / DECISION / HOLDING
function initTBD(){document.getElementById('ongoing-tbd').addEventListener('change',function(){toggleTBD(this.checked)})}
function toggleTBD(on){const i=document.getElementById('ongoing-year'),g=document.getElementById('year-group'),c=document.getElementById('tbd-container');if(on){i.disabled=true;i.value='';g.classList.add('disabled');c.classList.add('active')}else{i.disabled=false;g.classList.remove('disabled');c.classList.remove('active')}}
function checkDecision(){let g=false;document.querySelectorAll('#report-tbody .doc-type-select').forEach(s=>{if(s.value==='Go')g=true});const sec=document.getElementById('decision-section'),di=document.getElementById('decision-date'),ub=document.getElementById('decision-upload-btn');if(g){sec.classList.remove('disabled');di.disabled=false;ub.disabled=false}else{sec.classList.add('disabled');di.disabled=true;ub.disabled=true}}
function initDocTypeWatch(){document.addEventListener('change',e=>{if(e.target.classList.contains('doc-type-select')){styleDocType(e.target);checkDecision()}})}
function styleDocType(s){s.classList.remove('type-status','type-go');if(s.value==='Status')s.classList.add('type-status');else if(s.value==='Go')s.classList.add('type-go')}
function initHolding(){const cb=document.getElementById('holding-toggle'),co=document.getElementById('holding-cb-container');cb.addEventListener('change',()=>toggleHolding(cb.checked));co.addEventListener('click',e=>{if(e.target!==cb&&e.target.htmlFor!=='holding-toggle'){cb.checked=!cb.checked;toggleHolding(cb.checked)}})}
function toggleHolding(on){const co=document.getElementById('holding-cb-container'),se=document.getElementById('holding-section'),de=document.getElementById('holding-detail'),st=document.getElementById('holding-status'),ms=document.getElementById('holding-disabled-msg'),ip=document.getElementById('holding-reason');if(on){co.classList.add('active');se.classList.remove('disabled-holding');de.classList.add('expanded');st.textContent='프로젝트 홀딩 중';st.classList.add('on');ms.style.display='none';ip.disabled=false;setTimeout(()=>ip.focus(),300)}else{co.classList.remove('active');se.classList.add('disabled-holding');de.classList.remove('expanded');st.textContent='체크하면 홀딩 사유를 입력합니다';st.classList.remove('on');ms.style.display='block';ip.disabled=true;ip.value=''}}

// REPORT TABLE
function createReportRow(d){const r=document.createElement('tr');r.innerHTML=`<td><input type="date" class="table-input rpt-date" value="${d?.reportDate||''}"></td><td><div class="doc-upload-cell" ${d?.document?`data-file-name="${esc(d.document)}"`:''}><button class="btn-upload ${d?.document?'uploaded':''}">${d?.document?'변경':'선택'}</button><span class="doc-file-name">${esc(d?.document||'')}</span><button class="btn-del-doc" style="display:${d?.document?'flex':'none'}">×</button></div></td><td><select class="doc-type-select"><option value="">선택</option><option value="Status" ${d?.docType==='Status'?'selected':''}>Status</option><option value="Go" ${d?.docType==='Go'?'selected':''}>Go</option></select></td><td><input type="text" class="table-input rpt-note" placeholder="비고" value="${esc(d?.meetingNote||'')}"></td><td><button class="btn-del-row">×</button></td>`;const s=r.querySelector('.doc-type-select');if(s)styleDocType(s);r.querySelector('.btn-del-row').addEventListener('click',()=>{if(document.getElementById('report-tbody').rows.length<=1){alert('최소 1행');return}if(confirm('삭제?')){r.style.opacity='0';r.style.transition='opacity .3s';setTimeout(()=>{r.remove();checkDecision()},300)}});return r}
function addReportRow(d){const tb=document.getElementById('report-tbody'),r=createReportRow(d);tb.appendChild(r);if(!d){r.style.backgroundColor='#e8f5e9';setTimeout(()=>{r.style.transition='background-color .5s';r.style.backgroundColor=''},100)}}
function initReportTable(){addReportRow();document.getElementById('btn-add-report-row').addEventListener('click',()=>addReportRow())}
function initDocUpload(){document.getElementById('ongoing-content').addEventListener('click',e=>{if(e.target.classList.contains('btn-upload')&&!e.target.disabled){const c=e.target.closest('.doc-upload-cell');if(!c)return;const i=document.createElement('input');i.type='file';i.accept='.pdf,.doc,.docx,.xlsx,.ppt,.pptx';i.addEventListener('change',ev=>{const f=ev.target.files[0];if(!f)return;c.dataset.fileName=f.name;c.querySelector('.doc-file-name').textContent=f.name;const b=c.querySelector('.btn-upload');b.textContent='변경';b.classList.add('uploaded');c.querySelector('.btn-del-doc').style.display='flex'});i.click()}if(e.target.classList.contains('btn-del-doc')){const c=e.target.closest('.doc-upload-cell');if(!c||!confirm('파일 삭제?'))return;delete c.dataset.fileName;c.querySelector('.doc-file-name').textContent='';const b=c.querySelector('.btn-upload');b.textContent='선택';b.classList.remove('uploaded');c.querySelector('.btn-del-doc').style.display='none'}})}
function collectReports(){const rp=[];document.querySelectorAll('#report-tbody tr').forEach(r=>{const d=r.querySelector('.rpt-date')?.value||'',dc=r.querySelector('.doc-upload-cell')?.dataset.fileName||'',ty=r.querySelector('.doc-type-select')?.value||'',no=r.querySelector('.rpt-note')?.value||'';if(d||dc||ty||no)rp.push({reportDate:d,document:dc,docType:ty,meetingNote:no})});return rp}

// SAVE
function initSaveBtn(){document.getElementById('btn-save').addEventListener('click',saveOngoing)}
function saveOngoing(){const br=document.getElementById('ongoing-brand').value,pr=document.getElementById('ongoing-product').value.trim(),pj=document.getElementById('ongoing-project').value.trim(),gt=document.getElementById('ongoing-gate').value,yr=document.getElementById('ongoing-year').value,td=document.getElementById('ongoing-tbd').checked,mg=document.getElementById('ongoing-manager').value.trim();
    const m=[];if(!br)m.push('브랜드');if(!pr)m.push('제품명');if(!pj)m.push('프로젝트명');if(!gt)m.push('Gate');if(!yr&&!td)m.push('일자 또는 TBD');if(m.length){alert('필수:\n- '+m.join('\n- '));return}
    const rp=collectReports(),ho=document.getElementById('holding-toggle').checked;
    historyRecords.push({id:uid(),brand:br,product:pr,project:pj,gate:gt,year:yr,tbd:td,manager:mg,reports:rp,signatureDate:document.getElementById('decision-date').value||'',decisionDocument:document.getElementById('decision-upload-cell')?.dataset.fileName||'',holdingActive:ho,holdingReason:ho?(document.getElementById('holding-reason').value||''):'',released:false,createdAt:new Date().toISOString()});
    renderHistory();saveAll();alert('저장 완료!');if(confirm('폼 초기화?'))clearForm()}

// EDIT/UPDATE
function initEditBtns(){document.getElementById('btn-update').addEventListener('click',updateRecord);document.getElementById('btn-cancel-edit').addEventListener('click',()=>{if(confirm('수정 취소?')){setEditMode(false);clearForm()}})}
function editRecord(id){const rec=historyRecords.find(r=>r.id===id);if(!rec)return;document.querySelectorAll('.tab').forEach(t=>t.classList.remove('active'));document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));document.querySelector('[data-tab="ongoing"]').classList.add('active');document.getElementById('ongoing-content').classList.add('active');document.getElementById('page-title').textContent='II. Ongoing Projects';updateBrandOpts();
    document.getElementById('ongoing-brand').value=rec.brand;document.getElementById('ongoing-product').value=rec.product;document.getElementById('ongoing-project').value=rec.project;document.getElementById('ongoing-gate').value=rec.gate;document.getElementById('ongoing-year').value=rec.year;document.getElementById('ongoing-manager').value=rec.manager;document.getElementById('ongoing-tbd').checked=rec.tbd;toggleTBD(rec.tbd);
    const tb=document.getElementById('report-tbody');tb.innerHTML='';if(rec.reports?.length)rec.reports.forEach(r=>addReportRow(r));else addReportRow();checkDecision();
    document.getElementById('decision-date').value=rec.signatureDate||'';const dc=document.getElementById('decision-upload-cell');if(rec.decisionDocument){dc.dataset.fileName=rec.decisionDocument;dc.querySelector('.doc-file-name').textContent=rec.decisionDocument;dc.querySelector('.btn-upload').textContent='변경';dc.querySelector('.btn-upload').classList.add('uploaded');dc.querySelector('.btn-del-doc').style.display='flex'}
    document.getElementById('holding-toggle').checked=rec.holdingActive||false;toggleHolding(rec.holdingActive||false);setTimeout(()=>{document.getElementById('holding-reason').value=rec.holdingReason||''},50);
    editingId=id;setEditMode(true);document.getElementById('edit-indicator')?.remove();const ind=document.createElement('div');ind.className='edit-indicator';ind.id='edit-indicator';ind.textContent=`수정 중: [${rec.brand}] ${rec.project}`;document.querySelector('.ongoing-container .panel-title').insertAdjacentElement('afterend',ind);window.scrollTo({top:0,behavior:'smooth'})}
function updateRecord(){if(!editingId)return;const idx=historyRecords.findIndex(r=>r.id===editingId);if(idx===-1)return;const br=document.getElementById('ongoing-brand').value,pr=document.getElementById('ongoing-product').value.trim(),pj=document.getElementById('ongoing-project').value.trim(),gt=document.getElementById('ongoing-gate').value,yr=document.getElementById('ongoing-year').value,td=document.getElementById('ongoing-tbd').checked;
    const m=[];if(!br)m.push('브랜드');if(!pr)m.push('제품명');if(!pj)m.push('프로젝트명');if(!gt)m.push('Gate');if(!yr&&!td)m.push('일자 또는 TBD');if(m.length){alert('필수:\n- '+m.join('\n- '));return}
    const ho=document.getElementById('holding-toggle').checked;historyRecords[idx]={...historyRecords[idx],brand:br,product:pr,project:pj,gate:gt,year:yr,tbd:td,manager:document.getElementById('ongoing-manager').value.trim(),reports:collectReports(),signatureDate:document.getElementById('decision-date').value||'',decisionDocument:document.getElementById('decision-upload-cell')?.dataset.fileName||'',holdingActive:ho,holdingReason:ho?(document.getElementById('holding-reason').value||''):'',updatedAt:new Date().toISOString()};
    renderHistory();saveAll();setEditMode(false);alert('수정 완료!');if(confirm('폼 초기화?'))clearForm()}
function setEditMode(on){document.getElementById('btn-save').style.display=on?'none':'inline-block';document.getElementById('btn-update').style.display=on?'inline-block':'none';document.getElementById('btn-cancel-edit').style.display=on?'inline-block':'none';if(!on){editingId=null;document.getElementById('edit-indicator')?.remove()}}
function clearForm(){['ongoing-brand','ongoing-gate'].forEach(id=>document.getElementById(id).value='');['ongoing-product','ongoing-project','ongoing-year','ongoing-manager'].forEach(id=>document.getElementById(id).value='');document.getElementById('ongoing-tbd').checked=false;toggleTBD(false);document.getElementById('report-tbody').innerHTML='';addReportRow();document.getElementById('decision-date').value='';const dc=document.getElementById('decision-upload-cell');delete dc.dataset.fileName;dc.querySelector('.doc-file-name').textContent='';dc.querySelector('.btn-upload').textContent='선택';dc.querySelector('.btn-upload').classList.remove('uploaded');dc.querySelector('.btn-del-doc').style.display='none';document.getElementById('holding-toggle').checked=false;toggleHolding(false);checkDecision()}

// ★★★ RELEASE
function releaseProject(id){const rec=historyRecords.find(r=>r.id===id);if(!rec){alert('없음');return}if(rec.gate!=='Closure'){alert('Gate "Closure"만 릴리즈 가능');return}if(rec.tbd||!rec.year){alert('일자 미확정(TBD)은 릴리즈 불가');return}
    let ty;try{const d=new Date(rec.year);if(isNaN(d.getTime()))throw 0;ty=d.getFullYear().toString()}catch{alert('일자 형식 오류');return}
    if(!confirm(`Release 확인\n\n[${ty}] > [${rec.brand}] > [${rec.product}] > [${rec.project}]\n\nHistory 전체 기록이 함께 이동됩니다.`))return;
    if(!projectData[ty])projectData[ty]={projects:[]};
    let brand=projectData[ty].projects.find(p=>p.name===rec.brand);if(!brand){brand={name:rec.brand,subProjects:[],products:{'_direct':[]}};projectData[ty].projects.push(brand)}
    if(!brand.subProjects)brand.subProjects=[];if(!brand.subProjects.includes(rec.product))brand.subProjects.push(rec.product);
    if(!brand.products)brand.products={'_direct':[]};if(!brand.products[rec.product])brand.products[rec.product]=[];
    if(!brand.products[rec.product].includes(rec.project))brand.products[rec.product].push(rec.project);
    const key=rec.product+'::'+rec.project;
    releasedFiles[key]={projectInfo:{brand:rec.brand,product:rec.product,project:rec.project,manager:rec.manager,gate:rec.gate,year:rec.year,tbd:rec.tbd},reports:rec.reports||[],signatureDate:rec.signatureDate||'',decisionDocument:rec.decisionDocument||'',holdingActive:rec.holdingActive||false,holdingReason:rec.holdingReason||'',releasedAt:new Date().toISOString()};
    rec.released=true;renderYears();renderHistory();updateBrandOpts();saveAll();
    alert(`Release 완료!\n[${ty}] > [${rec.brand}] > [${rec.product}] > [${rec.project}]`)}

// HISTORY
function renderHistory(){const tb=document.getElementById('history-tbody');tb.innerHTML='';if(!historyRecords.length){tb.innerHTML='<tr class="empty-row"><td colspan="18" style="text-align:center;padding:40px;color:#999">저장된 기록이 없습니다</td></tr>';return}
    historyRecords.forEach((rec,di)=>{const no=di+1,yd=rec.tbd?'<span style="color:#FF9800;font-weight:700">TBD</span>':esc(rec.year||'-'),td=rec.tbd?'TBD':'-',hb=rec.holdingActive?'<span class="holding-badge on">홀딩중</span>':'<span class="holding-badge off">-</span>',hc=rec.holdingActive?'hold-cell':'';
        let rb='-';if(rec.gate==='Closure')rb=rec.released?'<button class="btn-release released" disabled>완료</button>':`<button class="btn-release" data-release="${rec.id}">Release</button>`;
        const rc=Math.max(rec.reports?.length||0,1);
        if(rec.reports?.length){rec.reports.forEach((rpt,i)=>{const badge=rpt.docType?`<span class="doc-type-badge ${rpt.docType.toLowerCase()}">${esc(rpt.docType)}</span>`:'-';const dc=rpt.docType?`dtype-cell type-${rpt.docType.toLowerCase()}`:'';const row=document.createElement('tr');
            if(i===0)row.innerHTML=`<td rowspan="${rc}">${no}</td><td rowspan="${rc}">${esc(rec.brand)}</td><td rowspan="${rc}">${esc(rec.product)}</td><td rowspan="${rc}">${esc(rec.project)}</td><td rowspan="${rc}" class="mgr-cell">${esc(rec.manager||'-')}</td><td rowspan="${rc}">${esc(rec.gate)}</td><td rowspan="${rc}">${yd}</td><td rowspan="${rc}">${td}</td><td>${esc(rpt.reportDate||'-')}</td><td>${rpt.document?`<span class="doc-link">${esc(rpt.document)}</span>`:'-'}</td><td class="${dc}">${badge}</td><td>${esc(rpt.meetingNote||'-')}</td><td rowspan="${rc}">${esc(rec.signatureDate||'-')}</td><td rowspan="${rc}" class="${hc}">${hb}</td><td rowspan="${rc}" class="${hc}">${esc(rec.holdingReason||'-')}</td><td rowspan="${rc}">${rb}</td><td rowspan="${rc}"><button class="btn-edit-hist" data-edit="${rec.id}">수정</button></td><td rowspan="${rc}"><button class="btn-del-hist" data-del="${rec.id}">삭제</button></td>`;
            else row.innerHTML=`<td>${esc(rpt.reportDate||'-')}</td><td>${rpt.document?`<span class="doc-link">${esc(rpt.document)}</span>`:'-'}</td><td class="${dc}">${badge}</td><td>${esc(rpt.meetingNote||'-')}</td>`;
            tb.appendChild(row)})}
        else{const row=document.createElement('tr');row.innerHTML=`<td>${no}</td><td>${esc(rec.brand)}</td><td>${esc(rec.product)}</td><td>${esc(rec.project)}</td><td class="mgr-cell">${esc(rec.manager||'-')}</td><td>${esc(rec.gate)}</td><td>${yd}</td><td>${td}</td><td>-</td><td>-</td><td>-</td><td>-</td><td>${esc(rec.signatureDate||'-')}</td><td class="${hc}">${hb}</td><td class="${hc}">${esc(rec.holdingReason||'-')}</td><td>${rb}</td><td><button class="btn-edit-hist" data-edit="${rec.id}">수정</button></td><td><button class="btn-del-hist" data-del="${rec.id}">삭제</button></td>`;tb.appendChild(row)}})}

function initHistoryEvents(){document.getElementById('history-tbody').addEventListener('click',e=>{const eb=e.target.closest('[data-edit]');if(eb){editRecord(eb.dataset.edit);return}const db=e.target.closest('[data-del]');if(db){if(confirm('삭제?')){const i=historyRecords.findIndex(r=>r.id===db.dataset.del);if(i!==-1){historyRecords.splice(i,1);renderHistory();saveAll()}}return}const rb=e.target.closest('[data-release]');if(rb){releaseProject(rb.dataset.release);return}});
    document.getElementById('btn-del-all').addEventListener('click',()=>{if(!historyRecords.length){alert('없음');return}if(confirm('전체 삭제?')){historyRecords.length=0;renderHistory();saveAll()}});
    document.getElementById('btn-clear-storage').addEventListener('click',clearStorage)}

// EXPORT
function initExport(){document.getElementById('btn-export').addEventListener('click',()=>{if(!historyRecords.length){alert('없음');return}const hd=['No','브랜드','제품','프로젝트','담당자','Gate','일자','TBD','보고일','문서','유형','비고','결재일','Holding','사유'];let csv='\uFEFF'+hd.map(csvE).join(',')+'\n';historyRecords.forEach((r,i)=>{const yr=r.tbd?'TBD':(r.year||'-'),ha=r.holdingActive?'Y':'N';if(r.reports?.length){r.reports.forEach((rp,j)=>{if(j===0)csv+=[i+1,csvE(r.brand),csvE(r.product),csvE(r.project),csvE(r.manager),csvE(r.gate),csvE(yr),r.tbd?'Y':'N',csvE(rp.reportDate||'-'),csvE(rp.document||'-'),csvE(rp.docType||'-'),csvE(rp.meetingNote||'-'),csvE(r.signatureDate||'-'),ha,csvE(r.holdingReason||'-')].join(',')+'\n';else csv+=['','','','','','','','',csvE(rp.reportDate||'-'),csvE(rp.document||'-'),csvE(rp.docType||'-'),csvE(rp.meetingNote||'-'),'','',''].join(',')+'\n'})}else csv+=[i+1,csvE(r.brand),csvE(r.product),csvE(r.project),csvE(r.manager),csvE(r.gate),csvE(yr),r.tbd?'Y':'N','-','-','-','-',csvE(r.signatureDate||'-'),ha,csvE(r.holdingReason||'-')].join(',')+'\n'});const lk=document.createElement('a');lk.href=URL.createObjectURL(new Blob([csv],{type:'text/csv;charset=utf-8;'}));lk.download=`CODEV_History_${new Date().toISOString().slice(0,10)}.csv`;lk.click();URL.revokeObjectURL(lk.href)})}

// INIT
document.addEventListener('DOMContentLoaded',()=>{loadAll();initTabs();renderYears();initArchiveBtns();initReportTable();initDocUpload();initTBD();initDocTypeWatch();initHolding();initSaveBtn();initEditBtns();checkDecision();initHistoryEvents();initExport();updateBrandOpts();renderHistory()});
